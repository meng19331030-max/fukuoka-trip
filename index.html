<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🌸朵朵的初次飛行-福岡探索之旅 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Zen Maru Gothic', sans-serif; background-color: #F8FAFC; color: #4A4A4A; }
        .fuji-blue { background-color: #A5D8FF; }
        .soft-pink { background-color: #FFD1E3; }
        .card-shadow { box-shadow: 0 8px 25px rgba(165, 216, 255, 0.15); }
        .magazine-header { position: relative; width: 100%; aspect-ratio: 16 / 9; overflow: hidden; border-radius: 2rem; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .magazine-header img { width: 100%; height: 100%; object-fit: cover; object-position: center; }
        .magazine-title-overlay { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(transparent, rgba(0,0,0,0.8)); padding: 1.2rem; border-radius: 0 0 2rem 2rem; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .glass-nav { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(10px); }
        .guide-tag { padding: 2px 8px; border-radius: 6px; font-size: 10px; font-weight: 900; margin-right: 4px; display: inline-block; }
        .transport-detail { display: none; margin-top: 10px; padding: 12px; border-radius: 16px; background: #f0f7ff; border: 1px dashed #A5D8FF; font-size: 11px; color: #1e40af; line-height: 1.6; }
    </style>
</head>
<body class="pb-32">

    <!-- 圖片燈箱 -->
    <div id="imageModal" style="display:none;" class="fixed inset-0 z-[100] bg-black/90 flex items-center justify-center p-4" onclick="this.style.display='none'">
        <img id="modalImg" class="max-w-full max-h-full rounded-xl shadow-2xl">
    </div>

    <!-- Header -->
    <header class="p-4 pt-6">
        <div class="magazine-header">
            <img src="https://cdn.phototourl.com/uploads/2026-03-17-d9da9a24-6193-46a7-9e7e-8f2c87802a46.jpg" alt="Cover">
            <div class="magazine-title-overlay">
                <h1 class="text-white text-lg font-black leading-tight tracking-tight italic">🌸 朵朵的初次飛行<br>福岡探索之旅 🇯🇵 2026</h1>
            </div>
        </div>
    </header>

    <!-- 底部導覽 -->
    <nav class="fixed bottom-6 left-6 right-6 h-16 glass-nav rounded-3xl flex justify-around items-center shadow-2xl z-50 border border-white/50 px-2">
        <button onclick="showSec('itin')" id="tab-itin" class="flex flex-col items-center text-blue-500 font-bold flex-1"><i class="fa-solid fa-calendar-day"></i><span class="text-[9px] mt-1">行程</span></button>
        <button onclick="showSec('list')" id="tab-list" class="flex flex-col items-center text-gray-400 flex-1"><i class="fa-solid fa-list-check"></i><span class="text-[9px] mt-1">清單</span></button>
        <button onclick="showSec('money')" id="tab-money" class="flex flex-col items-center text-gray-400 flex-1"><i class="fa-solid fa-coins"></i><span class="text-[9px] mt-1">記帳</span></button>
        <button onclick="showSec('sos')" id="tab-sos" class="flex flex-col items-center text-gray-400 flex-1"><i class="fa-solid fa-phone-flip"></i><span class="text-[9px] mt-1">緊急</span></button>
    </nav>

    <!-- 行程頁面 -->
    <section id="sec-itin" class="px-5 space-y-6">
        <!-- 日期選擇 -->
        <div class="flex gap-2 overflow-x-auto hide-scroll font-bold text-xs py-2">
            <button onclick="switchDay(1)" id="d1-btn" class="px-5 py-2 rounded-full bg-white text-gray-400 whitespace-nowrap shadow-sm">D1 4/23</button>
            <button onclick="switchDay(2)" id="d2-btn" class="px-5 py-2 rounded-full bg-white text-gray-400 whitespace-nowrap shadow-sm">D2 4/24</button>
            <button onclick="switchDay(3)" id="d3-btn" class="px-5 py-2 rounded-full bg-white text-gray-400 whitespace-nowrap shadow-sm">D3 4/25</button>
            <button onclick="switchDay(4)" id="d4-btn" class="px-5 py-2 rounded-full bg-white text-gray-400 whitespace-nowrap shadow-sm">D4 4/26</button>
            <button onclick="switchDay(5)" id="d5-btn" class="px-5 py-2 rounded-full bg-blue-500 text-white whitespace-nowrap shadow-sm">D5 4/27</button>
        </div>

        <div id="itinerary-list" class="space-y-6 relative pb-10">
            <div class="absolute left-3 top-0 bottom-0 w-0.5 bg-blue-100 -z-10"></div>
            
            <!-- Day 1-4 (隱藏) -->
            <div id="day-1" class="day-plan hidden space-y-6"></div>
            <div id="day-2" class="day-plan hidden space-y-6"></div>
            <div id="day-3" class="day-plan hidden space-y-6"></div>
            <div id="day-4" class="day-plan hidden space-y-6"></div>

            <!-- DAY 5 (4/27 Mon) -->
            <div id="day-5" class="day-plan space-y-6">
                
                <!-- 10:00 退房 -->
                <div class="flex gap-4">
                    <div class="w-8 h-8 rounded-full soft-pink shrink-0 mt-1 flex items-center justify-center text-white shadow-md font-bold text-xs">1</div>
                    <div class="bg-white rounded-3xl p-5 w-full card-shadow border-l-4 border-pink-300">
                        <div class="flex justify-between items-center mb-2">
                            <h3 class="font-black text-sm text-gray-800 italic">10:00 辦理退房 🏠</h3>
                        </div>
                        <p class="text-[11px] text-gray-500 font-bold italic leading-relaxed">
                            最後檢查一次衣櫃與浴室，確認朵朵的備品、充電線都帶齊囉！
                        </p>
                    </div>
                </div>

                <!-- 前往機場 -->
                <div class="flex gap-4">
                    <div class="w-8 h-8 rounded-full fuji-blue shrink-0 mt-1 flex items-center justify-center text-white shadow-md font-bold text-xs">2</div>
                    <div class="bg-white rounded-3xl p-5 w-full card-shadow border-l-4 border-blue-400">
                        <div class="flex justify-between items-start mb-3">
                            <div>
                                <span class="guide-tag bg-blue-100 text-blue-600 italic">前往機場方式</span>
                                <h3 class="font-black text-sm text-gray-800 mt-1">預計 10:20 出發 🚕</h3>
                            </div>
                            <button onclick="showTaxiCard('airport')" class="bg-blue-500 text-white p-2 rounded-xl text-[10px] font-black italic shadow-lg shadow-blue-100">司機字卡</button>
                        </div>
                        <div class="bg-blue-50 p-3 rounded-xl space-y-2">
                            <p class="text-[10px] text-blue-700 font-bold">🚕 方案：計程車 (約 20min)</p>
                            <p class="text-[10px] text-gray-500">不用搬行李換地鐵，帶寶寶回程最推薦。</p>
                        </div>
                    </div>
                </div>

                <!-- 機場補貨 -->
                <div class="flex gap-4">
                    <div class="w-8 h-8 rounded-full bg-orange-400 shrink-0 mt-1 flex items-center justify-center text-white shadow-md font-bold text-xs">3</div>
                    <div class="bg-white rounded-3xl p-5 w-full card-shadow">
                        <div class="flex justify-between items-center mb-2">
                            <h3 class="font-black text-sm text-gray-800 italic">機場最後補貨 🛍️</h3>
                        </div>
                        <div class="bg-orange-50 p-3 rounded-2xl border border-orange-100 italic">
                            <p class="text-[10px] text-orange-700 font-bold">
                                出境後免稅店最後衝刺！<br>
                                記得找找有沒有漏掉的伴手禮或給朵朵的小驚喜。
                            </p>
                        </div>
                    </div>
                </div>

                <!-- 返台班機 -->
                <div class="flex gap-4">
                    <div class="w-8 h-8 rounded-full fuji-blue shrink-0 mt-1 flex items-center justify-center text-white shadow-md font-bold text-xs"><i class="fa-solid fa-plane-arrival"></i></div>
                    <div class="bg-white rounded-3xl p-5 w-full card-shadow border-t-8 border-blue-500">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <span class="guide-tag bg-blue-500 text-white italic tracking-widest uppercase">Flight Back</span>
                                <h3 class="text-sm font-black text-gray-800 mt-2 italic tracking-tighter">12:20 長榮航空 BR105</h3>
                            </div>
                            <button onclick="viewImg('https://cdn.phototourl.com/uploads/2026-03-18-62e9009f-c1a2-420c-8443-7135151e6f84.jpg')" class="bg-blue-600 text-white text-[9px] px-3 py-1 rounded-full font-bold shadow-lg shadow-blue-100">機票憑證</button>
                        </div>
                        <p class="text-[11px] text-gray-400 italic font-bold">期待下一次與朵朵的探索之旅！✈️🇯🇵🌸</p>
                    </div>
                </div>
                
                <p class="text-center text-gray-300 text-[10px] italic py-8 uppercase tracking-widest">End of Journey • Happy Back Home</p>
            </div>
            
        </div>
    </section>

    <!-- 打包清單頁面 -->
    <section id="sec-list" class="px-5 hidden space-y-6 pb-24">
        <!-- 保持之前版本的清單代碼... -->
    </section>

    <!-- 記帳與緊急頁面 -->
    <section id="sec-money" class="px-5 hidden"></section>
    <section id="sec-sos" class="px-5 hidden"></section>

    <!-- 字卡 Modal (動態地址切換) -->
    <div id="taxiModal" style="display:none;" class="fixed inset-0 z-[100] bg-black/80 flex items-center justify-center p-6" onclick="this.style.display='none'">
        <div class="bg-white p-8 rounded-[3rem] w-full max-w-sm text-center shadow-2xl" onclick="event.stopPropagation()">
            <h2 id="taxi-title" class="text-gray-400 text-[10px] font-bold mb-4 tracking-widest uppercase italic font-black">Taxi Card</h2>
            <p id="taxi-addr" class="text-xl font-black text-blue-600 leading-tight mb-6 italic tracking-tighter"></p>
            <p id="taxi-msg" class="text-lg font-bold text-gray-800 bg-blue-50 py-4 rounded-2xl italic tracking-tighter"></p>
            <button onclick="document.getElementById('taxiModal').style.display='none'" class="mt-6 text-gray-300 text-[10px] font-bold underline">CLOSE</button>
        </div>
    </div>

    <script>
        function showSec(sec) {
            ['itin', 'list', 'money', 'sos'].forEach(s => {
                const el = document.getElementById('sec-' + s);
                const tab = document.getElementById('tab-' + s);
                if(el) el.classList.add('hidden');
                if(tab) tab.classList.replace('text-blue-500', 'text-gray-400');
            });
            document.getElementById('sec-' + sec).classList.remove('hidden');
            document.getElementById('tab-' + sec).classList.replace('text-gray-400', 'text-blue-500');
            window.scrollTo(0, 0);
        }

        function switchDay(day) {
            document.querySelectorAll('.day-plan').forEach(d => d.classList.add('hidden'));
            const target = document.getElementById('day-' + day);
            if(target) target.classList.remove('hidden');
            for(let i=1; i<=5; i++){
                const btn = document.getElementById('d'+i+'-btn');
                if(!btn) continue;
                if(i===day){ btn.classList.add('bg-blue-500','text-white','shadow-lg'); btn.classList.remove('bg-white','text-gray-400'); }
                else { btn.classList.remove('bg-blue-500','text-white','shadow-lg'); btn.classList.add('bg-white','text-gray-400'); }
            }
        }

        function viewImg(url) { document.getElementById('modalImg').src = url; document.getElementById('imageModal').style.display = 'flex'; }
        
        function showTaxiCard(type) {
            const modal = document.getElementById('taxiModal');
            const title = document.getElementById('taxi-title');
            const addr = document.getElementById('taxi-addr');
            const msg = document.getElementById('taxi-msg');
            
            if(type === 'airport') {
                title.innerText = "To Fukuoka Airport";
                addr.innerHTML = "目的地：福岡空港 国際線ターミナル<br>住所：福岡県福岡市博多区大字下臼井778-1";
                msg.innerHTML = "福岡空港の国際線ターミナルまでお願いします。<br><span class='text-xs'>(請載我到 福岡機場 國際線航廈)</span>";
            } else {
                title.innerText = "Back To Hotel";
                addr.innerHTML = "住所：福岡県福岡市<br>中央区平尾3-19-25";
                msg.innerHTML = "ここに行ってください。<br><span class='text-xs'>(請載我到這個地址)</span>";
            }
            modal.style.display = 'flex';
        }

        window.onload = () => {
            switchDay(5); // 預設打開 Day 5 給您確認
        };
    </script>
</body>
</html>
