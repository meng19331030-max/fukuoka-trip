<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🌸朵朵的初次飛行-福岡探索之旅 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --fuji-blue: #A5D8FF;
            --soft-pink: #FFD1E3;
            --main-bg: #FDF2F8; /* 依照圖片底色延伸的柔粉色 */
        }
        body { font-family: 'Zen Maru Gothic', sans-serif; background-color: var(--main-bg); color: #4A4A4A; overflow-x: hidden; }
        
        /* 頁首：縮小高度 + 焦點向右移 */
        .magazine-header { 
            position: relative; 
            width: 100%; 
            height: 280px; 
            overflow: hidden; 
            border-radius: 0 0 3.5rem 3.5rem; 
            z-index: 10;
        }
        /* 確保右側人物不被裁切 */
        .magazine-header img { width: 100%; height: 100%; object-fit: cover; object-position: 85% center; }
        
        /* 主內容拉高重疊 */
        .main-content {
            margin-top: -50px; 
            background: white;
            border-radius: 3.5rem 3.5rem 0 0;
            position: relative;
            z-index: 20;
            min-height: 100vh;
            padding-bottom: 120px;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.05);
            display: flex; /* 為了左側導覽 */
        }

        /* 左側垂直日期導覽列 */
        .side-date-nav {
            width: 70px;
            flex-shrink: 0;
            padding: 20px 0;
            border-right: 1px solid #f1f5f9;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            position: sticky;
            top: 0;
            height: calc(100vh - 50px);
        }

        /* 行程顯示區 */
        .itin-scroll-area { flex-grow: 1; padding: 20px 15px; }

        .date-icon-btn {
            width: 50px;
            height: 65px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 1.5rem;
            background: #F8FAFC;
            transition: 0.3s;
            cursor: pointer;
            border: 1px solid #f1f5f9;
        }
        .date-icon-btn.active { background: #3B82F6; color: white; box-shadow: 0 5px 15px rgba(59, 130, 246, 0.3); border: none; }
        .date-icon-btn i { font-size: 1.1rem; margin-bottom: 4px; }
        .date-icon-btn span { font-size: 0.65rem; font-weight: 900; }

        /* 浮動 ICON Tab 按鈕 (浮在圖片右下方) */
        .tab-overlay {
            position: absolute;
            bottom: 65px;
            right: 20px;
            display: flex;
            gap: 10px;
            z-index: 30;
        }
        .tab-btn {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(8px);
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            color: #888;
            transition: 0.3s;
        }
        .tab-btn.active { background: #3B82F6; color: white; transform: scale(1.1); }

        /* 卡片樣式 */
        .itin-card { border-radius: 1.8rem; padding: 1.2rem; border-left: 8px solid #e2e8f0; border: 1px solid #f1f5f9; background: white; margin-bottom: 1.2rem; position: relative; }
        .card-flight { border-left-color: #3b82f6; background-color: #eff6ff; }
        .card-spot { border-left-color: #ef4444; }
        .card-food { border-left-color: #f97316; }
        .card-hotel { border-left-color: #ec4899; }
        .card-shop { border-left-color: #8b5cf6; }

        .transport-btn { background: #F0F7FF; color: #1E40AF; padding: 8px 12px; border-radius: 10px; font-size: 10px; font-weight: bold; margin-top: 10px; display: inline-block; cursor: pointer; border: 1px solid #A5D8FF; }
        .transport-detail { display: none; padding: 12px; background: #F8FAFC; border-radius: 14px; border: 1px dashed #3B82F6; font-size: 11px; margin-top: 8px; line-height: 1.6; }
        .guide-tag { padding: 2px 8px; border-radius: 6px; font-size: 9px; font-weight: 900; margin-right: 4px; display: inline-block; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 300; align-items: center; justify-content: center; padding: 20px; }
        .hide-scroll::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="hide-scroll">

    <!-- 圖片燈箱 -->
    <div id="imageModal" class="modal" onclick="this.style.display='none'">
        <img id="modalImg" class="max-w-full max-h-full rounded-2xl shadow-2xl">
    </div>

    <!-- 1. 頁首與浮動 Tabs -->
    <header class="magazine-header">
        <img src="https://cdn.phototourl.com/uploads/2026-03-17-d9da9a24-6193-46a7-9e7e-8f2c87802a46.jpg" alt="Cover">
        <div class="magazine-title-overlay">
            <h1 class="text-white font-black text-xl italic tracking-tighter drop-shadow-lg">🌸 朵朵的初次飛行-福岡探索之旅 2026</h1>
        </div>
        <div class="tab-overlay">
            <button onclick="switchTab('itin')" id="tab-itin-btn" class="tab-btn active"><i class="fa-solid fa-location-dot"></i></button>
            <button onclick="switchTab('info')" id="tab-info-btn" class="tab-btn"><i class="fa-solid fa-info"></i></button>
            <button onclick="switchTab('cart')" id="tab-cart-btn" class="tab-btn"><i class="fa-solid fa-basket-shopping"></i></button>
            <button onclick="switchTab('cash')" id="tab-cash-btn" class="tab-btn"><i class="fa-solid fa-coins"></i></button>
        </div>
    </header>

    <div class="main-content">
        
        <!-- 左側垂直 Icon 日期選單 -->
        <aside class="side-date-nav hide-scroll" id="side-nav">
            <div onclick="switchDay(1)" class="date-icon-btn active" id="d1-btn">
                <i class="fa-solid fa-plane"></i><span>D1</span>
            </div>
            <div onclick="switchDay(2)" class="date-icon-btn" id="d2-btn">
                <i class="fa-solid fa-torii-gate"></i><span>D2</span>

            <div onclick="switchDay(3)" class="date-icon-btn" id="d3-btn">

            </div>
            <div onclick="switchDay(4)" class="date-icon-btn" id="d4-btn">

            <div onclick="switchDay(5)" class="date-icon-btn" id="d5-btn">
                <i class="fa-solid fa-plane-arrival"></i><span>D5</span>
            </div>
        </aside>

        <!-- 主要行程顯示區 -->
        <div class="itin-scroll-area">
            <!-- 分頁 1: 行程 -->
            <section id="sec-itin">
                <div class="bg-blue-50 p-4 rounded-[1.5rem] flex justify-between items-center border border-blue-100 mb-6 animate-fadeIn">
                    <div class="flex items-center gap-3">
                        <i class="fa-solid fa-cloud-sun text-2xl text-yellow-500"></i>
                        <div>
                            <p class="text-[9px] font-bold text-blue-400 uppercase">FUKUOKA</p>
                            <p class="font-black text-base text-gray-700">18°C / <span class="opacity-50 text-xs">體感 16°C</span></p>
                        </div>
                    </div>
                    <span class="bg-white px-2 py-0.5 rounded-full text-[9px] font-bold text-blue-500 shadow-sm">晴時多雲</span>
                </div>
                <div id="itin-display" class="space-y-2"></div>
            </section>

            <!-- 分頁 2: 資訊 (預設隱藏) -->
            <section id="sec-info" class="hidden space-y-6">
                <div class="bg-gray-50 rounded-[2.5rem] p-5 space-y-6 shadow-inner italic border border-gray-100">
                    <div class="border-b border-dashed border-gray-300 pb-4">
                        <div class="flex justify-between items-center mb-2"><span class="guide-tag bg-blue-500 text-white">BR106</span><span class="text-[9px] font-black">08:00 TPE ➔ 11:20 FUK</span></div>
                    </div>
                    <div class="flex justify-between items-center"><span class="guide-tag bg-pink-500 text-white">BR105</span><span class="text-[9px] font-black">12:20 FUK ➔ 13:55 TPE</span></div>
                </div>

                <div class="bg-white rounded-[2rem] p-5 card-shadow border border-blue-50">
                    <h3 class="font-black text-sm mb-3">🧳 打包清單進度 <span id="list-percent">0%</span></h3>
                    <div class="w-full bg-gray-100 h-1.5 rounded-full overflow-hidden mb-4"><div id="list-progress" class="bg-blue-400 h-full" style="width: 0%"></div></div>
                    <div id="preparation-list" class="space-y-2">
                        <!-- JS 渲染 -->
                    </div>
                </div>

                <div class="bg-red-50 p-5 rounded-3xl border border-red-100 space-y-3 font-bold text-[11px]">
                    <p class="text-red-600 italic">🆘 緊急支援：110 警察 | 119 救護車</p>
                    <p class="text-gray-500">中文翻譯支援：03-5285-8185</p>
                </div>
            </section>

            <!-- 分頁 3: 購物 (預設隱藏) -->
            <section id="sec-cart" class="hidden">
                <h2 class="font-black text-purple-600 mb-4 italic">Wish List 🛒</h2>
                <div class="grid grid-cols-1 gap-3" id="shopping-list">
                    <div class="bg-white p-4 rounded-2xl shadow-sm border border-purple-100 opacity-50 text-center text-xs italic font-bold">點擊右下角 + 新增好物</div>
                </div>
            </section>

            <!-- 分頁 4: 花費 (預設隱藏) -->
            <section id="sec-cash" class="hidden">
                <div class="bg-slate-800 text-white p-6 rounded-[2rem] text-center shadow-xl mb-6">
                    <p class="text-[9px] opacity-60 uppercase font-bold italic mb-1">Total Cost</p>
                    <p class="text-3xl font-black italic">¥ <span id="total-jpy">0</span></p>
                    <p class="text-[10px] opacity-50 mt-1">≈ NT$ <span id="total-twd">0</span></p>
                </div>
                <div id="expense-list" class="space-y-3"></div>
            </section>
        </div>
    </div>

    <!-- 字卡 Modal -->
    <div id="taxiModal" class="modal" onclick="this.style.display='none'">
        <div class="bg-white p-8 rounded-[3rem] w-full max-w-xs text-center shadow-2xl" onclick="event.stopPropagation()">
            <h2 id="taxi-title" class="text-gray-400 text-[10px] font-bold mb-4 tracking-widest uppercase italic">Driver Card</h2>
            <p id="taxi-addr" class="text-xl font-black text-blue-600 leading-tight mb-6 italic"></p>
            <p class="text-base font-bold text-gray-800 bg-blue-50 py-3 rounded-xl italic">ここに行ってください。<br><span class="text-xs font-normal">(請載我到這裡，謝謝)</span></p>
        </div>
    </div>

    <script>
        // 核心完整數據 (整合 Day 1 - Day 5)
        const tripData = {
            1: [
                { cat: 'flight', name: 'BR106 抵達福岡', time: '11:20', note: '🌟 機場必喝：抹茶拿鐵 (國際線51B)', icon: 'fa-plane', cert: 'https://cdn.phototourl.com/uploads/2026-03-17-d0a4373b-c132-4c37-83a6-db7e4d67d0ee.png' },
                { cat: 'hotel', name: 'Branche 藥院大通 SeedsStay', time: '12:10 Check-in', note: 'Agoda 1990699229', icon: 'fa-hotel', cert: 'https://cdn.phototourl.com/uploads/2026-03-17-5539a649-76e8-441d-a714-d8a31076f51f.png', taxi: '福岡県福岡市中央区平尾3-19-25' },
                { cat: 'food', name: '博多運河城午餐', time: '13:00', note: '薦4F/5F家庭餐廳，14:15 B1噴水秀', icon: 'fa-utensils', transInfo: '🚕 10min (¥1,300) | 🚃 藥院大通 ➔ 櫛田神社前 | 🚶 1.6km (25min)', maps: 'Canal City Hakata' },
                { cat: 'spot', name: '櫛田神社 ⛩️', time: '15:00', note: '靈泉鶴之井戶延年益壽、力石挑戰', icon: 'fa-torii-gate', transInfo: '🚶 步行 3-5min。♿ 從北出口走天橋進大樓搭電梯最平坦。', maps: 'Kushida Shrine' },
                { cat: 'food', name: 'AKIRA SUISAN 生魚片丼飯', time: '15:45', note: '超厚生魚片！便宜份量足 🍱', icon: 'fa-bowl-rice', img: 'https://cdn.phototourl.com/uploads/2026-03-17-ae4e14d8-7b9f-4c64-8a04-9e1467d408c4.jpg', maps: 'AKIRA SUISAN' },
                { cat: 'spot', name: '麵包超人博物館 🍭', time: '16:00', note: '經川端商店街步行7min。入內換揹巾', icon: 'fa-face-smile', maps: 'Anpanman Museum Fukuoka' },
                { cat: 'food', name: '鈴懸 (すずかけ) 本店', time: '16:45', note: '甜點天花板：草莓大福🍓', icon: 'fa-ice-cream', gallery: ['https://cdn.phototourl.com/uploads/2026-03-17-666e9bb9-774c-4290-bf9b-5de8599eb2e2.webp', 'https://cdn.phototourl.com/uploads/2026-03-17-01da1205-01db-46c0-832c-6e5d9b23c8dc.jpg'], maps: 'Suzukake Honten' },
                { cat: 'food', name: '前田屋牛腸鍋', time: '17:00 預約', note: '代碼: TS7DNWA82N', icon: 'fa-fire-burner', cert: 'https://cdn.phototourl.com/uploads/2026-03-17-1f7e6db7-717f-4cc5-acf6-8f09526cd024.jpg', maps: 'Maedaya Hakata' },
                { cat: 'shop', name: 'Bon Repas 藥院店 🛒', time: '20:30', note: '半額特價熟食！就在藥院大通出口', icon: 'fa-basket-shopping' }
            ],
            2: [
                { cat: 'spot', name: '竈門神社 🌸', time: '09:40', note: '最強結緣神社。旅人號拍照點', icon: 'fa-torii-gate', transInfo: '🚃 認明「西鐵藥院站」(非地鐵)➔二日市站轉太宰府線➔🚕1000円。', maps: 'Kamado Jinja' },
                { cat: 'food', name: '若松屋鰻魚飯', time: '11:20', note: '必點鰻魚蛋捲。11:30前到免排', icon: 'fa-bowl-rice', maps: 'Wakamatsuya' },
                { cat: 'spot', name: '太宰府美食對決 🍡', time: '12:00', note: '梅枝餅：寺田屋(皮薄)、かさの家(人氣NO1)', icon: 'fa-cookie', maps: 'Dazaifu Tenmangu' },
                { cat: 'shop', name: 'Birthday 大佐野店 🍼', time: '13:30', note: '🚕 太宰府站搭8-10min。適合推車午睡', icon: 'fa-baby', maps: 'Birthday Osano' },
                { cat: 'spot', name: '警固神社 ⛩️', time: '15:30', note: '三越 6F 育嬰室整理戰利品', icon: 'fa-torii-gate', transInfo: '🚕 二日市站 ➔ 特急回天神。', maps: 'Kego Shrine' },
                { cat: 'shop', name: '天神地下街 🛍️', time: '16:00', note: 'I\'m d\'onut?排隊判斷。3COINS。', icon: 'fa-bag-shopping' },
                { cat: 'shop', name: 'Mina 天神 🛍️', time: '16:30', note: 'Loft(4F)/西松屋(7F補貨首選)。冷氣電梯極友善', icon: 'fa-shirt', maps: 'Mina Tenjin' },
                { cat: 'food', name: 'NIKUICHI 燒肉 (藥院店)', time: '19:00', note: '高CP和牛晚餐', icon: 'fa-fire' }
            ],
            3: [
                { cat: 'food', name: '食堂 おわん 🍱', time: '09:00 預約', note: '已訂位。明太子釜飯套餐。', icon: 'fa-utensils', cert: 'https://cdn.phototourl.com/uploads/2026-03-18-14b25d1c-c3dd-4a94-9053-1e5287531a6d.png', img: 'https://cdn.phototourl.com/uploads/2026-03-18-1a0cecb5-25d7-43b0-8130-6976e7adc56a.jpg' },
                { cat: 'spot', name: '海洋世界 (水族館) 🐬', time: '11:00 表演', note: '11:00海豚秀。12:00抽天竺鼠號碼牌。', icon: 'fa-fish', transInfo: '🚕 往博多埠頭(¥1,500)➔🚢 10:05 準時開船。', maps: 'Marine World' },
                { cat: 'spot', name: '海之中道公園花海', time: '14:00', note: '粉蝶花最美時刻', icon: 'fa-seedling' },
                { cat: 'spot', name: '福岡塔 🗼', time: '16:45', note: '🚢 16:15 船班往地行浜(百道)。', icon: 'fa-tower-observation', maps: 'Fukuoka Tower' },
                { cat: 'spot', name: 'E・ZO (teamLab) 🎨', time: '17:30', note: '5F投影超炫。⚠️換揹巾進入', icon: 'fa-masks-theater' },
                { cat: 'shop', name: 'MARK IS 🍼', time: '18:30', note: '3F 阿卡將、爬行軟墊放電區', icon: 'fa-shopping-bag', maps: 'MARK IS Momochi' }
            ],
            4: [
                { cat: 'spot', name: '藥院漫步 🌿', time: '上午', note: '輕鬆藥院街道', icon: 'fa-person-walking' },
                { cat: 'shop', name: '天神/大名區逛街 🛍️', time: '14:00', note: 'I\'m d\'onut? / Shin Shin(3-4點去)', icon: 'fa-shirt', transInfo: '🚶 走路 12-15min。' },
                { cat: 'spot', name: 'LaLaport (鋼彈) 🤖', time: '16:30', note: '18:00燈光秀。PIE VAT退稅', icon: 'fa-robot', transInfo: '🚌 天神大丸前(4C)搭 44/46L 直達。', maps: 'LaLaport Fukuoka', taxi: 'ららぽーと福岡（ガンダム立像前）' },
                { cat: 'shop', name: '博多站伴手禮 🎁', time: '19:00', note: 'LOPIA、治一郎、努努雞(冷凍)', icon: 'fa-gift', transInfo: '🚌 鋼彈出口 44/45 號巴士回博多站。', taxi: '福岡県福岡市中央区平尾3-19-25' }
            ],
            5: [
                { cat: 'hotel', name: '10:00 退房 🏠', time: '10:00', note: '最後檢查行李物品', icon: 'fa-door-open' },
                { cat: 'flight', name: 'BR105 返台 ✈️', time: '12:20', note: '機場最後補貨。期待下次飛行。', icon: 'fa-plane-arrival', cert: 'https://cdn.phototourl.com/uploads/2026-03-18-62e9009f-c1a2-420c-8443-7135151e6f84.jpg', taxi: '福岡空港 国際線ターミナル' }
            ]
        };

        const prepData = ['護照及機票憑證', 'Visit Japan QR', '交通 App & Suica', 'esim 網路', '寶寶推車及防水罩', '奶粉奶瓶/副食品', '尿布濕巾/常備藥', '大型購物袋/保冷袋'];

        // 頁面切換
        function switchTab(tab) {
            ['itin', 'info', 'cart', 'cash'].forEach(s => {
                document.getElementById('sec-' + s).classList.add('hidden');
                document.getElementById('tab-' + s + '-btn').classList.remove('active');
            });
            document.getElementById('sec-' + tab).classList.remove('hidden');
            document.getElementById('tab-' + tab + '-btn').classList.add('active');
            window.scrollTo(0, 0);
        }

        // 天數渲染
        function switchDay(day) {
            const list = document.getElementById('itin-display');
            list.innerHTML = '';
            document.querySelectorAll('.date-icon-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('d'+day+'-btn').classList.add('active');

            tripData[day].forEach(item => {
                const card = document.createElement('div');
                card.className = `itin-card card-${item.cat} animate-fadeIn`;
                let content = `
                    <div class="flex justify-between items-start mb-2">
                        <span class="guide-tag bg-slate-100 text-slate-400">${item.cat.toUpperCase()}</span>
                        <span class="text-[10px] font-black text-blue-400">${item.time}</span>
                    </div>
                    <div class="flex justify-between items-center">
                        <h4 class="font-black text-gray-800 text-sm italic underline decoration-blue-50">${item.name}</h4>
                        ${item.maps ? `<a href="https://www.google.com/maps/search/?api=1&query=${item.maps}" class="text-blue-500"><i class="fa-solid fa-map-location-dot"></i></a>` : ''}
                    </div>
                    <p class="text-[9px] text-gray-400 mt-2 font-bold">${item.note}</p>
                `;
                if(item.cert) content += `<button onclick="viewImg('${item.cert}')" class="mt-3 bg-blue-50 text-blue-600 text-[8px] font-black px-3 py-1 rounded-full border border-blue-100">查看憑證 ➔</button>`;
                if(item.img) content += `<img src="${item.img}" class="mt-2 rounded-xl h-32 w-full object-cover shadow-inner" onclick="viewImg('${item.img}')">`;
                if(item.gallery) content += `<div class="grid grid-cols-2 gap-2 mt-2">${item.gallery.map(g => `<img src="${g}" class="rounded-xl h-20 object-contain bg-gray-50" onclick="viewImg('${g}')">`).join('')}</div>`;
                if(item.transInfo) content += `<div class="transport-btn" onclick="this.nextElementSibling.style.display='block'">前往方式 ➔</div><div class="transport-detail italic font-bold">${item.transInfo}</div>`;
                if(item.taxi) content += `<button onclick="showTaxiCard('${item.taxi}')" class="mt-3 w-full bg-blue-500 text-white py-2.5 rounded-2xl text-[10px] font-black shadow-lg italic">🚕 司機字卡</button>`;
                
                card.innerHTML = content;
                list.appendChild(card);
            });
            // 底部補上每日提示
            list.innerHTML += `<div class="bg-pink-100/50 rounded-2xl p-4 text-center border-2 border-dashed border-pink-200 mb-20 italic font-black text-pink-600 text-[10px]">💡 注意：福岡早晚溫差大，推車請備外套！</div>`;
        }

        // 字卡邏輯
        function showTaxiCard(addr) {
            const modal = document.getElementById('taxiModal');
            document.getElementById('taxi-addr').innerHTML = addr.replace('福岡', '<br>福岡');
            modal.style.display = 'flex';
        }

        function viewImg(url) { document.getElementById('modalImg').src = url; document.getElementById('imageModal').style.display = 'flex'; }

        // 清單渲染
        function updateProgress() {
            const checks = document.querySelectorAll('#preparation-list input[type="checkbox"]');
            const done = Array.from(checks).filter(c => c.checked).length;
            const percent = Math.round((done / checks.length) * 100);
            document.getElementById('list-percent').innerText = percent + '%';
            document.getElementById('list-progress').style.width = percent + '%';
        }

        function initApp() {
            const container = document.getElementById('preparation-list');
            prepData.forEach(item => {
                container.innerHTML += `<label class="flex items-center gap-3 bg-gray-50 p-3 rounded-2xl italic font-bold text-[11px]"><input type="checkbox" onchange="updateProgress()" class="checkbox-custom"> ${item}</label>`;
            });
            switchDay(1);
        }

        window.onload = initApp;
    </script>
</body>
</html>
