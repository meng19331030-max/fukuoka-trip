<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🌸朵朵的初次飛行-福岡探索之旅 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --fuji-blue: #3B82F6; --soft-pink: #FB7185; --macaron-bg: #FDF2F8; }
        body { font-family: 'Zen Maru Gothic', sans-serif; background: linear-gradient(135deg, #FDF2F8 0%, #E0F2FE 100%); color: #4A4A4A; overflow-x: hidden; }
        
        /* 頁首：縮小高度且圖片置中 */
        .magazine-header { position: relative; width: 100%; height: 200px; overflow: hidden; border-radius: 0 0 3rem 3rem; z-index: 10; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .magazine-header img { width: 100%; height: 100%; object-fit: cover; object-position: center; } 
        .title-overlay { position: absolute; bottom: 15px; left: 20px; right: 140px; color: white; text-shadow: 0 2px 10px rgba(0,0,0,0.6); z-index: 20; }

        /* 天氣滑動區塊 */
        .weather-scroller { display: flex; gap: 10px; overflow-x: auto; padding: 15px 20px; scroll-behavior: smooth; }
        .weather-card { min-width: 90px; background: white; padding: 10px; border-radius: 1.5rem; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.02); border: 1px solid #f1f5f9; }
        .weather-card i { font-size: 1.2rem; margin: 5px 0; color: #fbbf24; }
        .weather-card .date { font-size: 9px; font-weight: 900; color: #94a3b8; }
        .weather-card .temp { font-size: 11px; font-weight: 900; color: #475569; }

        /* 右下橫式功能選單 */
        .tab-nav-box { position: absolute; bottom: 15px; right: 15px; background: rgba(255, 255, 255, 0.75); backdrop-filter: blur(10px); padding: 6px 10px; border-radius: 1.2rem; display: flex; gap: 6px; z-index: 50; border: 1px solid rgba(255,255,255,0.4); }
        .tab-btn { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; background: white; color: #94A3B8; transition: 0.3s; font-size: 0.8rem; }
        .tab-btn.active { background: var(--fuji-blue); color: white; }

        /* 主佈局 */
        .app-body { display: flex; }
        .side-nav { width: 65px; flex-shrink: 0; display: flex; flex-direction: column; align-items: center; gap: 12px; position: sticky; top: 10px; height: calc(100vh - 40px); }
        .date-icon-btn { width: 44px; height: 58px; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 1.2rem; background: white; border: 1px solid #f1f5f9; cursor: pointer; transition: 0.3s; }
        .date-icon-btn.active { background: var(--fuji-blue); color: white; border: none; box-shadow: 0 5px 12px rgba(59, 130, 246, 0.2); }
        .date-icon-btn i { font-size: 0.9rem; margin-bottom: 2px; }
        .date-icon-btn span { font-size: 0.55rem; font-weight: 900; }

        /* 行程卡片 */
        .content-area { flex-grow: 1; padding: 0 15px 120px 5px; }
        .bubble-card { border-radius: 2rem; padding: 1.2rem; background: white; margin-bottom: 1rem; position: relative; border: 1px solid #f1f5f9; box-shadow: 0 5px 15px rgba(0,0,0,0.02); }
        .card-flight { border: 2px solid #BFDBFE; background: #EFF6FF; }
        .card-hotel { border-top: 6px solid #F9A8D4; }
        .card-food { border-top: 6px solid #FDE68A; }
        .card-spot { border-top: 6px solid #FDA4AF; }
        .card-shop { border-top: 6px solid #C7D2FE; }

        /* 🔧 全格修正按鈕：僅保留圖示 */
        .btn-edit-tool { position: absolute; top: 10px; right: 10px; font-size: 14px; color: #E2E8F0; cursor: pointer; padding: 5px; transition: 0.3s; }
        .btn-edit-tool:hover { color: var(--fuji-blue); }

        .trans-hint { background: #F0F9FF; color: #0369A1; padding: 12px; border-radius: 14px; border: 1px dashed #BAE6FD; font-size: 11px; margin-top: 10px; line-height: 1.5; font-weight: bold; }
        .guide-label { padding: 2px 8px; border-radius: 6px; font-size: 9px; font-weight: 900; color: white; display: inline-block; margin-bottom: 5px; }
        
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 300; align-items: center; justify-content: center; padding: 20px; overflow-y: auto; }
        .hide-scroll::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="hide-scroll">

    <!-- 圖片燈箱 -->
    <div id="imageModal" class="modal" onclick="this.style.display='none'"><img id="modalImg" class="max-w-full max-h-full rounded-3xl border-4 border-white shadow-2xl"></div>

    <!-- 1. 頁首與功能選單 -->
    <header class="magazine-header">
        <img src="https://cdn.phototourl.com/free/2026-04-08-0cf446a0-4def-44f2-9ec6-0ffe6257c1b9.jpg" alt="Cover">
        <div class="title-overlay">
            <h1 class="font-black text-lg italic tracking-tighter">🌸 朵朵的初次飛行<br>福岡探索之旅 2026</h1>
        </div>
        <div class="tab-nav-box shadow-lg">
            <button onclick="switchTab('itin')" id="tab-itin-btn" class="tab-btn active"><i class="fa-solid fa-map-location-dot"></i></button>
            <button onclick="switchTab('info')" id="tab-info-btn" class="tab-btn"><i class="fa-solid fa-info-circle"></i></button>
            <button onclick="switchTab('cart')" id="tab-cart-btn" class="tab-btn"><i class="fa-solid fa-basket-shopping"></i></button>
            <button onclick="switchTab('cash')" id="tab-cash-btn" class="tab-btn"><i class="fa-solid fa-coins"></i></button>
        </div>
    </header>

    <!-- 天氣預報滑動區 -->
    <div class="weather-scroller hide-scroll">
        <div class="weather-card"><p class="date">4/23 THU</p><i class="fa-solid fa-cloud-sun"></i><p class="temp">18° / 23°</p></div>
        <div class="weather-card"><p class="date">4/24 FRI</p><i class="fa-solid fa-sun"></i><p class="temp">19° / 25°</p></div>
        <div class="weather-card"><p class="date">4/25 SAT</p><i class="fa-solid fa-cloud"></i><p class="temp">17° / 22°</p></div>
        <div class="weather-card"><p class="date">4/26 SUN</p><i class="fa-solid fa-sun"></i><p class="temp">20° / 26°</p></div>
        <div class="weather-card"><p class="date">4/27 MON</p><i class="fa-solid fa-cloud-rain"></i><p class="temp">18° / 22°</p></div>
    </div>

    <div class="app-body">
        <!-- 2. 左側日期導覽 -->
        <aside class="side-nav hide-scroll" id="side-nav">
            <div onclick="switchDay(1)" class="date-icon-btn active" id="d1-btn"><i class="fa-solid fa-plane"></i><span>D1</span></div>
            <div onclick="switchDay(2)" class="date-icon-btn" id="d2-btn"><i class="fa-solid fa-torii-gate"></i><span>D2</span></div>
            <div onclick="switchDay(3)" class="date-icon-btn" id="d3-btn"><i class="fa-solid fa-dolphin"></i><span>D3</span></div>
            <div onclick="switchDay(4)" class="date-icon-btn" id="d4-btn"><i class="fa-solid fa-robot"></i><span>D4</span></div>
            <div onclick="switchDay(5)" class="date-icon-btn" id="d5-btn"><i class="fa-solid fa-house-chimney"></i><span>D5</span></div>
        </aside>

        <!-- 3. 右側主內容 -->
        <div class="main-content">
            <!-- 行程頁面 -->
            <section id="sec-itin"><div id="itin-display" class="space-y-4"></div></section>

            <!-- 資訊與打包清單 -->
            <section id="sec-info" class="hidden space-y-6 animate-fadeIn pb-24">
                <div class="bg-white rounded-[2rem] p-6 card-shadow border border-blue-50">
                    <div class="flex justify-between items-center mb-2"><p class="text-xs font-black italic">🧳 打包進度</p><span id="list-percent" class="text-blue-500 font-black">0%</span></div>
                    <div class="w-full bg-gray-100 h-1.5 rounded-full overflow-hidden mb-5"><div id="list-progress" class="bg-blue-400 h-full transition-all duration-700" style="width: 0%"></div></div>
                    <div id="prep-container" class="space-y-2"></div>
                </div>
                <div class="bg-red-50 p-5 rounded-3xl border border-red-100 italic space-y-3 font-bold text-[10px]">
                    <p class="text-red-600 underline">🆘 緊急電話</p>
                    <p>警察: 110 | 救護: 119 | 翻譯: 03-5285-8185</p>
                </div>
            </section>

            <!-- 購物分頁 -->
            <section id="sec-cart" class="hidden animate-fadeIn pb-24">
                <h2 class="text-xl font-black text-purple-600 italic mb-4">Wish List 🛒</h2>
                <div id="cart-display" class="grid grid-cols-2 gap-3"></div>
            </section>

            <!-- 花費分頁 -->
            <section id="sec-cash" class="hidden animate-fadeIn pb-24">
                <div class="bg-slate-800 text-white p-6 rounded-[2rem] text-center shadow-xl mb-4 italic font-black">
                    <p class="text-3xl">¥ <span id="total-jpy">0</span></p>
                    <p class="text-[10px] opacity-50">≈ NT$ <span id="total-twd">0</span></p>
                </div>
                <div id="cash-display" class="space-y-3"></div>
            </section>
        </div>
    </div>

    <!-- 編輯行程 Modal -->
    <div id="editModal" class="modal" onclick="this.style.display='none'">
        <div class="bg-white p-8 rounded-[3rem] w-full max-w-xs shadow-2xl space-y-4" onclick="event.stopPropagation()">
            <h3 class="font-black italic">🔧 修正行程</h3>
            <input id="edit-name" type="text" class="w-full p-3 rounded-xl bg-gray-50 border-none font-bold text-xs">
            <input id="edit-time" type="text" class="w-full p-3 rounded-xl bg-gray-50 border-none font-bold text-xs">
            <textarea id="edit-note" class="w-full p-3 rounded-xl bg-gray-50 border-none font-bold text-xs h-32"></textarea>
            <div class="flex gap-2">
                <button onclick="deleteItin()" class="flex-1 bg-red-50 text-red-500 py-3 rounded-xl font-black text-xs">刪除</button>
                <button onclick="saveItinEdit()" class="flex-1 bg-blue-500 text-white py-3 rounded-xl font-black text-xs">儲存</button>
            </div>
        </div>
    </div>

    <script>
        // 核心數據庫
        let tripData = JSON.parse(localStorage.getItem('fuk_trip_cute_v2')) || {
            1: [
                { cat: 'flight', name: '航空公司 EVA AIR BR106', time: '08:00 TPE', note: '桃園機場 ✈️ 11:20 抵達。<br>🌟 必喝：抹茶拿鐵 (國際線入境 51B)', cert: 'https://cdn.phototourl.com/uploads/2026-03-17-d0a4373b-c132-4c37-83a6-db7e4d67d0ee.png' },
                { cat: 'hotel', name: '住宿：Branche 藥院大通', time: '12:10 Check-in', note: 'Agoda: 1990699229', taxi: '福岡県福岡市中央区平尾3-19-25', trans: '🚕 計程車 (20min): ¥2,800 (NT$620)' },
                { cat: 'food', name: '博多運河城午餐', time: '13:00', note: '薦4/5F家庭餐廳。⛲️ 14:15 B1噴水秀', trans: '🚕 ¥1,300 (10min) | 🚃 藥院大通➔櫛田神社前站 | 🚶 1.6km (25min)', maps: 'Canal City Hakata' },
                { cat: 'spot', name: '櫛田神社 ⛩️', time: '15:00', note: '🙏 參拜：1.手水舍洗手漱口 ➔ 2.本殿投錢拍手 ➔ 3.求籤。<br>🏛️ 備註：靈泉鶴之井戶、力石挑戰。附近有一蘭！', trans: '🚶 步行 3-5min。♿ 推車：由北出口走天橋入大樓搭電梯。', maps: 'Kushida Shrine' },
                { cat: 'food', name: '鈴懸 (すずかけ) 本店', time: '16:45', note: '福岡甜點天花板！🍓 鈴乃○餅、草莓大福', gallery: ['https://cdn.phototourl.com/uploads/2026-03-17-666e9bb9-774c-4290-bf9b-5de8599eb2e2.webp', 'https://cdn.phototourl.com/uploads/2026-03-17-01da1205-01db-46c0-832c-6e5d9b23c8dc.jpg'], maps: 'Suzukake' },
                { cat: 'food', name: '前田屋牛腸鍋', time: '17:00 預約', note: '預約號碼: TS7DNWA82N', cert: 'https://cdn.phototourl.com/uploads/2026-03-17-1f7e6db7-717f-4cc5-acf6-8f09526cd024.jpg' },
                { cat: 'shop', name: '🛒 Bon Repas 藥院店', time: '20:30', note: '熟食半額特價！距離飯店5min' }
            ],
            2: [
                { cat: 'spot', name: '竈門神社 🌸', time: '09:40', note: '結緣神社。認明西鐵藥院站。', trans: '🚃 西鐵藥院 ➔ 二日市 ➔ 太宰府線 ➔ 🚕 1000円。' },
                { cat: 'food', name: '若松屋鰻魚飯 🍱', time: '11:20', note: '必吃鰻魚蛋捲！10:30-15:30。' },
                { cat: 'food', name: '梅枝餅名店對決', time: '12:00', note: '寺田屋(皮薄)、かさの家(人氣NO1)、安武(重口)' },
                { cat: 'shop', name: 'Mina 天神 🛍️', time: '16:30', note: '7F 西松屋重點補貨。全段電梯冷氣。' }
            ],
            3: [
                { cat: 'food', name: '食堂 おわん 🍱', time: '09:00 預約', note: '日式明太子釜飯套餐。', cert: 'https://cdn.phototourl.com/uploads/2026-03-18-14b25d1c-c3dd-4a94-9053-1e5287531a6d.png' },
                { cat: 'spot', name: '海洋世界 (水族館) 🐬', time: '11:00 表演', note: '🐬 11:00 表演場。12:00抽天竺鼠整理券。', trans: '🚕 往博多埠頭➔🚢 10:05 開船。' }
            ],
            4: [
                { cat: 'spot', name: '大濠公園 🌿', time: '上午', note: '最美星巴克。', trans: '🚕 8-10min (¥1000) | 🚇 地鐵 2 站。' },
                { cat: 'spot', name: 'LaLaport (鋼彈) 🤖', time: '16:30', note: '燈光秀最美。', trans: '🚌 天神大丸前(4C)搭 44/46L 直達。', taxi: 'ららぽーと福岡（ガンダム立像前）' }
            ],
            5: [
                { cat: 'flight', name: 'BR105 返台 ✈️', time: '12:20', note: '期待下次飛行。', cert: 'https://cdn.phototourl.com/uploads/2026-03-18-62e9009f-c1a2-420c-8443-7135151e6f84.jpg', taxi: '福岡空港 国際線ターミナル' }
            ]
        };

        const checkListItems = ["護照/機票憑證", "Visit Japan QR", "GO/Uber綁卡", "Suica加值", "購買 esims", "推車+雨罩+揹帶", "奶粉奶瓶/副食品", "尿布濕巾/常用藥", "自拍棒腳架", "相機/攝影機", "大型購物袋", "洗衣球", "常備藥品"];
        let currentDay = 1, currentTab = 'itin', editIdx = -1;
        let checks = JSON.parse(localStorage.getItem('fuk_check_v2')) || {};

        function switchTab(tab) {
            currentTab = tab;
            ['itin', 'info', 'cart', 'cash'].forEach(s => {
                document.getElementById('sec-' + s).classList.add('hidden');
                document.getElementById('tab-' + s + '-btn').classList.remove('active');
            });
            document.getElementById('sec-' + tab).classList.remove('hidden');
            document.getElementById('tab-' + tab + '-btn').classList.add('active');
            document.getElementById('side-nav').style.display = (tab === 'itin') ? 'flex' : 'none';
        }

        function switchDay(day) {
            currentDay = day;
            const list = document.getElementById('itin-display');
            list.innerHTML = '';
            document.querySelectorAll('.date-icon-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('d'+day+'-btn').classList.add('active');

            tripData[day].forEach((item, idx) => {
                const card = document.createElement('div');
                card.className = `itin-card bubble-card card-${item.cat} animate-fadeIn`;
                let content = `<div class="btn-edit-tool" onclick="openEdit(${idx})"><i class="fa-solid fa-wrench"></i></div>`;
                content += `<div class="flex justify-between items-start mb-2"><span class="guide-tag bg-slate-400 italic font-black">${item.cat.toUpperCase()}</span><span class="text-[9px] font-black text-blue-400 italic">${item.time}</span></div>`;
                content += `<div class="flex justify-between"><div><h4 class="font-black text-gray-800 text-sm italic underline decoration-blue-50">${item.name}</h4><p class="text-[9px] text-gray-400 mt-2 font-bold">${item.note || ''}</p></div>`;
                if(item.maps) content += `<a href="https://www.google.com/maps/search/?api=1&query=${item.maps}" class="text-blue-500"><i class="fa-solid fa-map-location-dot"></i></a>`;
                content += `</div>`;
                if(item.cert) content += `<button onclick="viewImg('${item.cert}')" class="transport-btn mt-2 shadow-sm">憑證 ➔</button>`;
                if(item.img) content += `<img src="${item.img}" class="mt-2 rounded-2xl h-28 w-full object-cover shadow-sm" onclick="viewImg('${item.img}')">`;
                if(item.gallery) content += `<div class="grid grid-cols-2 gap-2 mt-2">${item.gallery.map(g => `<img src="${g}" class="rounded-xl h-20 object-contain bg-gray-50" onclick="viewImg('${g}')">`).join('')}</div>`;
                if(item.trans) content += `<div class="transport-btn mt-2" onclick="this.nextElementSibling.style.display='block'">交通 ➔</div><div class="transport-detail italic font-bold trans-hint">${item.trans}</div>`;
                if(item.taxi) content += `<button onclick="showTaxiCard('${item.taxi}')" class="mt-3 w-full bg-blue-500 text-white py-2.5 rounded-2xl text-[10px] font-black shadow-lg italic">🚕 司機字卡</button>`;
                card.innerHTML = content;
                list.appendChild(card);
            });
        }

        function openEdit(idx) {
            editIdx = idx;
            const item = tripData[currentDay][idx];
            document.getElementById('edit-name').value = item.name;
            document.getElementById('edit-time').value = item.time;
            document.getElementById('edit-note').value = (item.note || "").replace(/<br>/g, "\n");
            document.getElementById('editModal').style.display = 'flex';
        }
        function saveItinEdit() {
            const item = tripData[currentDay][editIdx];
            item.name = document.getElementById('edit-name').value;
            item.time = document.getElementById('edit-time').value;
            item.note = document.getElementById('edit-note').value.replace(/\n/g, "<br>");
            localStorage.setItem('fuk_trip_cute_v2', JSON.stringify(tripData));
            switchDay(currentDay);
            document.getElementById('editModal').style.display = 'none';
        }
        function deleteItin() {
            if(confirm("確定刪除？")) {
                tripData[currentDay].splice(editIdx, 1);
                localStorage.setItem('fuk_trip_cute_v2', JSON.stringify(tripData));
                switchDay(currentDay);
                document.getElementById('editModal').style.display = 'none';
            }
        }

        function renderCheck() {
            const container = document.getElementById('prep-container');
            container.innerHTML = checkListItems.map(item => `
                <label class="flex items-center gap-3 bg-gray-50 p-3 rounded-xl italic font-bold text-[11px]">
                    <input type="checkbox" onchange="upCheck('${item}')" class="checkbox-custom" ${checks[item]?'checked':''}> ${item}
                </label>`).join('');
            upPercent();
        }
        function upCheck(item) { checks[item] = !checks[item]; localStorage.setItem('fuk_check_v2', JSON.stringify(checks)); upPercent(); }
        function upPercent() {
            const done = Object.values(checks).filter(v => v).length;
            const percent = Math.round((done / checkListItems.length) * 100);
            document.getElementById('list-percent').innerText = percent + '%';
            document.getElementById('list-progress').style.width = percent + '%';
        }

        function showTaxiCard(addr) { document.getElementById('taxi-addr').innerText = addr; document.getElementById('taxiModal').style.display = 'flex'; }
        function viewImg(url) { document.getElementById('modalImg').src = url; document.getElementById('imageModal').style.display = 'flex'; }
        window.onload = () => { renderCheck(); switchDay(1); };
    </script>
</body>
</html>
