<!DOCTYPE html>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --main-pink: #FCE7F3; --main-blue: #E0F2FE; --accent-blue: #3B82F6; --accent-pink: #FB7185; }
        body { font-family: 'Zen Maru Gothic', sans-serif; background: linear-gradient(135deg, #FDF2F8 0%, #E0F2FE 100%); color: #4A4A4A; overflow-x: hidden; }
        
        /* 封面雜誌感 */
        .magazine-cover-box { position: relative; width: 100%; height: 260px; overflow: hidden; border-radius: 0 0 4rem 4xl; z-index: 10; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .magazine-cover-box img { width: 100%; height: 100%; object-fit: cover; object-position: 80% center; }
        .title-overlay { position: absolute; bottom: 30px; left: 20px; right: 140px; color: white; text-shadow: 0 2px 10px rgba(0,0,0,0.5); z-index: 20; }

        /* 右下角功能分頁 (橫式) */
        .tab-panel { position: absolute; bottom: 15px; right: 15px; background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); padding: 8px 12px; border-radius: 1.5rem; display: flex; gap: 8px; z-index: 50; border: 1px solid rgba(255,255,255,0.3); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .tab-btn { width: 36px; height: 36px; border-radius: 12px; display: flex; align-items: center; justify-content: center; background: white; color: #94A3B8; transition: 0.3s; }
        .tab-btn.active { background: var(--accent-blue); color: white; transform: translateY(-3px); }

        /* 主佈局：左導航 + 右內容 */
        .app-container { display: flex; margin-top: 20px; }
        .side-nav { width: 65px; flex-shrink: 0; display: flex; flex-direction: column; align-items: center; gap: 15px; position: sticky; top: 15px; height: calc(100vh - 40px); }
        .date-btn { width: 48px; height: 65px; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 1.5rem; background: white; border: 2px solid #F1F5F9; cursor: pointer; transition: 0.3s; }
        .date-btn.active { background: var(--accent-blue); color: white; border: none; box-shadow: 0 8px 20px rgba(59, 130, 246, 0.3); }
        .date-btn i { font-size: 1.1rem; margin-bottom: 2px; }
        .date-btn span { font-size: 0.6rem; font-weight: 900; }

        /* 行程卡片：圓潤童趣 */
        .content-area { flex-grow: 1; padding: 0 15px 120px 5px; }
        .bubble-card { border-radius: 2.2rem; padding: 1.5rem; background: white; margin-bottom: 1.2rem; position: relative; border: 1px solid #f1f5f9; box-shadow: 0 10px 20px rgba(0,0,0,0.02); }
        .card-flight { border: 3px solid #BFDBFE; background: #EFF6FF; }
        .card-spot { border-top: 6px solid #FDA4AF; }
        .card-food { border-top: 6px solid #FDE68A; }
        .card-hotel { border-top: 6px solid #F9A8D4; }
        .card-shop { border-top: 6px solid #C7D2FE; }

        .btn-edit { position: absolute; top: 12px; right: 12px; font-size: 12px; color: #CBD5E1; cursor: pointer; padding: 5px; }
        .transport-tag { background: #F0F9FF; color: #0369A1; padding: 10px; border-radius: 15px; font-size: 11px; margin-top: 10px; border: 1px dashed #BAE6FD; line-height: 1.5; font-weight: bold; }
        .guide-label { padding: 2px 8px; border-radius: 6px; font-size: 10px; font-weight: 900; color: white; display: inline-block; margin-bottom: 5px; }
        
        .fab-add { position: fixed; bottom: 30px; right: 25px; width: 60px; height: 60px; background: var(--accent-blue); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; z-index: 100; box-shadow: 0 10px 25px rgba(59, 130, 246, 0.4); }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 300; align-items: center; justify-content: center; padding: 20px; overflow-y: auto; }
        .hide-scroll::-webkit-scrollbar { display: none; }
    </style>
</head>

            window.scrollTo(0,0);
        }

        function switchDay(day) {
            currentDay = day;
            const list = document.getElementById('itin-display');
            list.innerHTML = '';
            document.querySelectorAll('.date-icon-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('d'+day+'-btn').classList.add('active');

            tripData[day].forEach((item, idx) => {
                const card = document.createElement('div');
                card.className = `itin-card bubble-card card-${item.cat} animate-fadeIn`;
                let content = `<div class="edit-btn" onclick="openEdit(${idx})"><i class="fa-solid fa-wrench"></i></div>`;
                content += `<div class="flex justify-between items-start mb-2"><span class="guide-tag bg-slate-400 italic">${item.cat.toUpperCase()}</span><span class="text-[10px] font-black text-blue-400">${item.time}</span></div>`;
                content += `<div class="flex justify-between"><div><h4 class="font-black text-gray-800 text-sm italic underline decoration-blue-100">${item.name}</h4><p class="text-[9px] text-gray-400 mt-2 font-bold">${item.note || ''}</p></div>`;
                if(item.maps) content += `<a href="https://www.google.com/maps/search/?api=1&query=${item.maps}" class="text-blue-500"><i class="fa-solid fa-map-location-dot"></i></a>`;
                content += `</div>`;
                if(item.cert) content += `<button onclick="viewImg('${item.cert}')" class="transport-btn mt-2 shadow-sm">查看憑證 ➔</button>`;
                if(item.img) content += `<img src="${item.img}" class="mt-2 rounded-2xl h-28 w-full object-cover" onclick="viewImg('${item.img}')">`;
                if(item.gallery) content += `<div class="grid grid-cols-2 gap-2 mt-2">${item.gallery.map(g => `<img src="${g}" class="rounded-xl h-20 object-contain bg-gray-50" onclick="viewImg('${g}')">`).join('')}</div>`;
                if(item.trans) content += `<div class="transport-btn mt-2" onclick="this.nextElementSibling.style.display='block'">前往方式 ➔</div><div class="transport-detail italic font-bold">${item.trans}</div>`;
                if(item.taxi) content += `<button onclick="showTaxiCard('${item.taxi}')" class="mt-3 w-full bg-blue-500 text-white py-2.5 rounded-2xl text-[10px] font-black shadow-lg italic">🚕 司機字卡</button>`;
                card.innerHTML = content;
                list.appendChild(card);
            });
            list.innerHTML += `<div class="bg-blue-100/50 rounded-2xl p-4 text-center border-2 border-dashed border-blue-200 mb-20 italic font-black text-blue-600 text-[10px]">💡 注意：4月底福岡早晚偏涼，請備外套！</div>`;
        }

        // 行程編輯
        function openEdit(idx) {
            editingIdx = idx;
            const item = tripData[currentDay][idx];
            document.getElementById('edit-name').value = item.name;
            document.getElementById('edit-time').value = item.time;
            document.getElementById('edit-note').value = item.note || "";
            document.getElementById('editModal').style.display = 'flex';
        }
        function saveEdit() {
            const item = tripData[currentDay][editingIdx];
            item.name = document.getElementById('edit-name').value;
            item.time = document.getElementById('edit-time').value;
            item.note = document.getElementById('edit-note').value;
            localStorage.setItem('fuk_trip_v终極', JSON.stringify(tripData));
            switchDay(currentDay);
            document.getElementById('editModal').style.display = 'none';
        }
        function deleteItem() {
            if(confirm("確定刪除？")) {
                tripData[currentDay].splice(editingIdx, 1);
                localStorage.setItem('fuk_trip_v终極', JSON.stringify(tripData));
                switchDay(currentDay);
                document.getElementById('editModal').style.display = 'none';
            }
        }

        // 打包清單
        function renderChecklist() {
            const container = document.getElementById('checklist-render');
            container.innerHTML = checkItems.map((item, i) => `<label class="flex items-center gap-3 bg-gray-50 p-3 rounded-2xl italic font-bold text-[11px]"><input type="checkbox" onchange="upCheck('${item}')" class="checkbox-custom" ${checkStatus[item]?'checked':''}> ${item}</label>`).join('');
            upPercent();
        }
        function upCheck(item) { checkStatus[item] = !checkStatus[item]; localStorage.setItem('fuk_check_final', JSON.stringify(checkStatus)); upPercent(); }
        function upPercent() {
            const done = Object.values(checkStatus).filter(v => v).length;
            const percent = Math.round((done / checkItems.length) * 100);
            document.getElementById('list-percent').innerText = percent + '%';
            document.getElementById('list-progress').style.width = percent + '%';
        }

        // 購物清單
        function openCartModal() { document.getElementById('modal-cart').style.display = 'flex'; }
        function saveCartItem() {
            const name = document.getElementById('new-cart-name').value;
            const file = document.getElementById('new-cart-img').files[0];
            if(!name) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                shopping.push({ name, img: e.target.result });
                localStorage.setItem('fuk_cart_final', JSON.stringify(shopping));
                renderCart(); document.getElementById('modal-cart').style.display = 'none';
            };
            if(file) reader.readAsDataURL(file); else { shopping.push({ name, img: '' }); renderCart(); document.getElementById('modal-cart').style.display = 'none'; }
        }
        function renderCart() {
            const grid = document.getElementById('cart-render');
            grid.innerHTML = shopping.map((item, i) => `<div class="bg-white p-3 rounded-3xl shadow-sm relative">
                <button onclick="removeCart(${i})" class="absolute top-1 right-1 text-gray-300">✕</button>
                ${item.img ? `<img src="${item.img}" class="w-full h-24 object-cover rounded-2xl mb-2">` : '<div class="h-24 bg-gray-50 rounded-2xl"></div>'}
                <p class="text-[10px] font-bold text-center">${item.name}</p>
            </div>`).join('');
        }
        function removeCart(i) { shopping.splice(i, 1); localStorage.setItem('fuk_cart_final', JSON.stringify(shopping)); renderCart(); }

        // 記帳
        function openCashModal() { document.getElementById('cashModal').style.display = 'flex'; }
        function saveCashItem() {
            const name = document.getElementById('cash-name-input').value;
        
            const jpy = parseInt(document.getElementById('cash-jpy-input').value);
            if(!name || !jpy) return;
            expenses.push({ name, jpy });
            localStorage.setItem('fuk_cash_final', JSON.stringify(expenses));
            renderCash(); document.getElementById('cashModal').style.display = 'none';
        }
        function renderCash() {
            let total = 0;
            document.getElementById('cash-render').innerHTML = expenses.map((e, i) => { total += e.jpy; return `<div class="bg-white p-3 rounded-xl flex justify-between italic text-xs"><span>${e.name}</span><span class="text-blue-500 font-black">¥${e.jpy}</span></div>`; }).join('');
            document.getElementById('total-jpy').innerText = total.toLocaleString();
            document.getElementById('total-twd').innerText = Math.round(total * 0.22).toLocaleString();
        }

        function handleFab() { if(currentTab === 'cart') openCartModal(); if(currentTab === 'cash') openCashModal(); }
        function showTaxiCard(addr) { document.getElementById('taxi-addr').innerText = addr; document.getElementById('taxiModal').style.display = 'flex'; }
        function viewImg(url) { document.getElementById('modalImg').src = url; document.getElementById('imageModal').style.display = 'flex'; }
        
        window.onload = () => { renderChecklist(); renderCart(); renderCash(); switchDay(1); };
    </script>
</body>
</html>
