<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 朵朵的初次飛行 - 福岡探索之旅</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#D9718C',
                        primaryLight: '#DC909A',
                        secondary: '#518EA6',
                        accent: '#5897A6',
                        green: '#588C5C',
                        fujiBlue: '#E6F0F3',
                        warmGray: '#F7F7F7'
                    },
                    borderRadius: { '2xl': '1.5rem', '3xl': '2rem' }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Zen Maru Gothic', sans-serif; background-color: #F7F7F7; color: #4A4A4A; -webkit-tap-highlight-color: transparent; }
        .card-shadow { box-shadow: 0 8px 30px rgba(0,0,0,0.04); }
        .nav-blur { backdrop-filter: blur(10px); background: rgba(255, 255, 255, 0.8); }
        .timeline-line::before { content: ''; position: absolute; left: 20px; top: 0; bottom: 0; width: 2px; background: #DC909A; opacity: 0.3; }
        [v-cloak] { display: none; }
    </style>
</head>
<body class="max-w-md mx-auto">

<div id="app" v-cloak class="pb-24">
    <header class="relative">
        <img src="https://cdn.phototourl.com/free/2026-04-08-0cf446a0-4def-44f2-9ec6-0ffe6257c1b9.jpg" 
             class="w-full h-48 object-cover rounded-b-3xl shadow-lg" alt="Cover">
    </header>

    <div class="flex mt-4">
        <aside class="w-16 flex flex-col items-center space-y-3 py-4 fixed left-0 top-56 z-10 bg-white/60 rounded-r-2xl shadow-sm backdrop-blur-md">
            <button v-for="(day, index) in itinerary" :key="index"
                    @click="activeDay = index"
                    :class="['w-10 h-10 rounded-full flex items-center justify-center text-xs font-bold transition-all', 
                             activeDay === index ? 'bg-primary text-white scale-110 shadow-md' : 'bg-white text-gray-400']">
                D{{index + 1}}
            </button>
        </aside>

        <main class="flex-1 ml-16 px-4">
            <div v-if="activeTab === 'trip'">
                <div class="bg-white p-4 rounded-2xl mb-6 card-shadow flex items-center justify-between border-l-4 border-secondary">
                    <div>
                        <div class="text-[10px] text-gray-400 font-bold">{{itinerary[activeDay].date}} 福岡天氣</div>
                        <div class="flex items-center space-x-2">
                            <i :class="getWeatherIcon(itinerary[activeDay].weather.type)" class="text-accent text-xl"></i>
                            <span class="text-lg font-bold">{{itinerary[activeDay].weather.temp}}°C</span>
                        </div>
                    </div>
                    <div class="text-right text-[10px] text-gray-500 leading-tight">
                        體感 {{itinerary[activeDay].weather.feel}}°C<br>
                        <span class="text-accent">{{itinerary[activeDay].weather.tips}}</span>
                    </div>
                </div>

                <div class="relative timeline-line">
                    <div v-for="(item, idx) in itinerary[activeDay].items" :key="idx" class="relative pl-10 mb-8">
                        <div class="absolute left-0 top-1 w-10 flex justify-center">
                            <div class="w-4 h-4 bg-primary rounded-full border-4 border-white z-10"></div>
                        </div>

                        <div :class="['p-4 rounded-2xl card-shadow border border-gray-100 bg-white', 
                                    item.type === 'flight' ? 'bg-gradient-to-br from-secondary to-accent text-white border-none' : '',
                                    item.specialStyle ? 'ring-2 ring-primaryLight' : '']">
                            
                            <div class="flex justify-between items-start mb-2">
                                <div>
                                    <span v-if="item.category" class="text-[9px] px-2 py-0.5 rounded-full bg-fujiBlue text-secondary font-bold mr-2">{{item.category}}</span>
                                    <h3 :class="['font-bold mt-1 leading-snug', item.type === 'flight' ? 'text-white' : 'text-gray-700']">{{item.title}}</h3>
                                </div>
                                <span class="text-[10px] opacity-60 font-mono">{{item.time}}</span>
                            </div>

                            <div class="flex flex-wrap gap-1 mb-3">
                                <span v-if="item.mustEat" class="text-[9px] px-1.5 py-0.5 bg-pink-100 text-primary rounded font-bold">#必吃</span>
                                <span v-if="item.mustBuy" class="text-[9px] px-1.5 py-0.5 bg-blue-100 text-secondary rounded font-bold">#必買</span>
                                <span v-if="item.booking" class="text-[9px] px-1.5 py-0.5 bg-green-100 text-green rounded font-bold">#預約：{{item.booking}}</span>
                            </div>

                            <p v-if="item.note" class="text-[11px] mb-3 whitespace-pre-line leading-relaxed opacity-80">{{item.note}}</p>
                            
                            <div v-if="item.images" class="grid grid-cols-2 gap-2 mb-3">
                                <img v-for="img in item.images" :src="img" class="w-full h-24 object-cover rounded-xl" @click="openModal(img)">
                            </div>
                            <img v-else-if="item.image" :src="item.image" class="w-full h-32 object-cover rounded-xl mb-3" @click="openModal(item.image)">

                            <div class="flex flex-wrap gap-2">
                                <button v-if="item.map" @click="goMap(item.map)" class="flex-1 min-w-[80px] py-2 bg-fujiBlue text-secondary rounded-xl text-[10px] font-bold">
                                    <i class="fas fa-location-arrow mr-1"></i> 導航
                                </button>
                                <button v-if="item.bookingImg" @click="openModal(item.bookingImg)" class="flex-1 min-w-[80px] py-2 bg-primaryLight text-white rounded-xl text-[10px] font-bold">
                                    <i class="fas fa-file-invoice mr-1"></i> 查看憑證
                                </button>
                                <button v-if="item.taxiNote" @click="showTaxi(item.taxiNote)" class="flex-1 min-w-[80px] py-2 bg-gray-700 text-white rounded-xl text-[10px] font-bold">
                                    <i class="fas fa-taxi mr-1"></i> 司機看
                                </button>
                            </div>

                            <div v-if="item.transportBox" class="mt-4 p-3 bg-warmGray rounded-xl border-l-4 border-accent space-y-2">
                                <div v-for="t in item.transportBox" class="text-[10px] leading-relaxed">
                                    <div class="font-bold text-secondary mb-0.5">{{t.mode}}</div>
                                    <div class="text-gray-600">{{t.info}}</div>
                                    <button v-if="t.mapPoint" @click="goMap(t.mapPoint)" class="text-primary font-bold mt-1 inline-block">[點擊查看乘車點]</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
            </main>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 h-20 nav-blur border-t border-gray-100 flex items-center justify-around px-6 z-30">
        <button @click="activeTab = 'trip'" :class="activeTab === 'trip' ? 'text-primary' : 'text-gray-400'" class="flex flex-col items-center">
            <i class="fas fa-map-marked-alt text-xl"></i><span class="text-[9px] mt-1 font-bold">行程</span>
        </button>
        <button @click="activeTab = 'guide'" :class="activeTab === 'guide' ? 'text-primary' : 'text-gray-400'" class="flex flex-col items-center">
            <i class="fas fa-lightbulb text-xl"></i><span class="text-[9px] mt-1 font-bold">指南</span>
        </button>
        <button @click="activeTab = 'money'" :class="activeTab === 'money' ? 'text-primary' : 'text-gray-400'" class="flex flex-col items-center">
            <i class="fas fa-wallet text-xl"></i><span class="text-[9px] mt-1 font-bold">記帳</span>
        </button>
        <button @click="activeTab = 'check'" :class="activeTab === 'check' ? 'text-primary' : 'text-gray-400'" class="flex flex-col items-center">
            <i class="fas fa-clipboard-list text-xl"></i><span class="text-[9px] mt-1 font-bold">清單</span>
        </button>
    </nav>

    <div v-if="modalImg" class="fixed inset-0 bg-black/90 z-[100] flex items-center justify-center p-4" @click="modalImg = null">
        <img :src="modalImg" class="max-w-full max-h-[85vh] rounded-lg">
    </div>
    <div v-if="taxiModal" class="fixed inset-0 bg-black/80 z-[100] flex items-center justify-center p-6" @click="taxiModal = null">
        <div class="bg-white p-8 rounded-3xl w-full text-center" @click.stop>
            <div class="text-xs text-gray-400 mb-4 font-bold">運転手さんへ</div>
            <div class="text-xl font-bold mb-8 leading-relaxed text-gray-800 bg-warmGray p-4 rounded-2xl">{{taxiModal}}</div>
            <button @click="taxiModal = null" class="w-full py-4 bg-primary text-white rounded-2xl font-bold">關閉</button>
        </div>
    </div>
</div>

<script>
const { createApp, ref, computed } = Vue;

createApp({
    setup() {
        const activeDay = ref(0);
        const activeTab = ref('trip');
        const modalImg = ref(null);
        const taxiModal = ref(null);

        const itinerary = ref([
            {
                date: '4/23 (四) DAY 1',
                weather: { type: 'cloud', temp: 18, feel: 16, tips: '出航！福岡微涼舒適' },
                items: [
                    { type: 'flight', airline: 'EVA AIR', flightNo: 'BR106', depCode: 'TPE', depTime: '08:00', arrCode: 'FUK', arrTime: '11:20', duration: '2h 20m', ticketImg: 'https://cdn.phototourl.com/uploads/2026-03-17-d0a4373b-c132-4c37-83a6-db7e4d67d0ee.png' },
                    { type: 'spot', category: '住宿', title: '飯店 Check-in', time: '12:10', note: '住宿：Branche 藥院大通 SeedsStay Yakuin\nAgoda 訂單 1990699229', bookingImg: 'https://cdn.phototourl.com/uploads/2026-03-17-5539a649-76e8-441d-a714-d8a31076f51f.png', taxiNote: '住所：福岡県福岡市中央区平尾3-19-25\n(ホテルまでお願いします)', transportBox: [{ mode: '🚕 計程車 (20min)', info: '約 2,200 - 2,800 日圓 (約 NT$480-620)'}] },
                    { 
                        type: 'spot', category: '美食', title: '博多運河城午餐', time: '13:00', 
                        note: '備註：推薦去 4 樓或 5 樓 (拉麵競技場)：位置大方便推車，適合讓寶寶坐沙發。\n水舞表演：B1 水池每整點 (14/15:00) 有表演。',
                        mustEat: true, map: '博多運河城',
                        transportBox: [
                            { mode: '🚕 計程車 (約8-10分)', info: '約 1,000 - 1,300 日圓 (約 NT$220-280)' },
                            { mode: '🚃 搭地鐵', info: '從「藥院大通站」搭乘地鐵七隈線（往博多方向），在「櫛田神社前站」下車。', mapPoint: '藥院大通站' },
                            { mode: '🚶 步行', info: '距離約 1.6 公里，推車步行約 20-25 分鐘。' }
                        ]
                    },
                    {
                        type: 'spot', category: '景點', title: '櫛田神社⛩️', time: '15:00',
                        note: '參拜攻略：\n1. 門口右側手水舍淨手漱口。\n2. 本殿投5/50元日幣，二禮二拍手一禮。\n3. 求籤(100日圓)，不好的綁旁邊。\n必看：靈泉鶴之井戶、試力石。',
                        mustEat: true, map: '櫛田神社',
                        transportBox: [
                            { mode: '🚶 步行路線 (推車友善)', info: '博多運河城北邊出口(North Building) -> 2樓行人天橋 -> 搭電梯下1樓 -> 過馬路即可看見側門。' }
                        ]
                    },
                    {
                        type: 'spot', category: '景點', title: '川端通商店街 & 麵包超人館', time: '16:00',
                        note: '沿著商店街往北走 (不怕日曬雨淋)。\nAKIRA SUISAN 生魚片丼：CP值超高！',
                        image: 'https://cdn.phototourl.com/uploads/2026-03-17-ae4e14d8-7b9f-4c64-8a04-9e1467d408c4.jpg',
                        map: 'AKIRA SUISAN',
                        transportBox: [{ mode: '🚶 步行 (約7分鐘)', info: '穿過川端通商店街直達。' }]
                    },
                    {
                        type: 'spot', category: '美食', title: '鈴懸 本店 (甜點界天花板)', time: '16:45',
                        note: '位於麵包超人館對面。\n必買：鈴乃○餅 (迷你銅鑼燒)、鈴乃最中、草莓大福 (4-5月限定)。',
                        specialStyle: true,
                        images: [
                            'https://cdn.phototourl.com/uploads/2026-03-17-666e9bb9-774c-4290-bf9b-5de8599eb2e2.webp',
                            'https://cdn.phototourl.com/uploads/2026-03-17-01da1205-01db-46c0-832c-6e5d9b23c8dc.jpg'
                        ],
                        mustBuy: true
                    },
                    {
                        type: 'spot', category: '美食', title: '前田屋牛腸鍋', time: '17:00',
                        note: '招牌：和牛味噌牛腸鍋\n預約號碼：TS7DNWA82N',
                        booking: '2026/04/23 17:00',
                        bookingImg: 'https://cdn.phototourl.com/uploads/2026-03-17-1f7e6db7-717f-4cc5-acf6-8f09526cd024.jpg'
                    },
                    {
                        type: 'spot', category: '購物', title: 'Bon Repas 藥院店超市', time: '18:30',
                        note: '位於藥院大通站出口。八點半後有半額特價便當。',
                        transportBox: [{ mode: '🚶 步行 (12-15分鐘)', info: '吃完牛腸鍋散步回藥院飯店，輕鬆回程。' }]
                    }
                ]
            },
            // Day 2-5 維持上個版本的內容...
            { date: '4/24 (五) DAY 2', weather: { type: 'sun', temp: 22, feel: 21, tips: '太宰府陽光普照' }, items: [] },
            { date: '4/25 (六) DAY 3', weather: { type: 'cloud', temp: 20, feel: 18, tips: '海邊風大' }, items: [] },
            { date: '4/26 (日) DAY 4', weather: { type: 'sun', temp: 23, feel: 22, tips: '鋼彈亮起來' }, items: [] },
            { date: '4/27 (一) DAY 5', weather: { type: 'cloud', temp: 19, feel: 18, tips: '準備回家' }, items: [] }
        ]);

        const expenses = ref([]);
        const checklists = ref([]);

        const totalJPY = computed(() => expenses.value.reduce((sum, e) => sum + e.amount, 0));
        const totalTWD = computed(() => Math.round(totalJPY.value * 0.22));
        const checkProgress = computed(() => 0);

        const goMap = (q) => window.open(`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(q)}`);
        const openModal = (u) => modalImg.value = u;
        const showTaxi = (t) => taxiModal.value = t;
        const getWeatherIcon = (t) => t === 'sun' ? 'fas fa-sun' : t === 'cloud' ? 'fas fa-cloud-sun' : 'fas fa-cloud-showers-heavy';

        return { activeDay, activeTab, itinerary, expenses, totalJPY, totalTWD, checklists, checkProgress, goMap, modalImg, taxiModal, openModal, showTaxi, getWeatherIcon };
    }
}).mount('#app');
</script>

</body>
</html>
