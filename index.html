<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🌸朵朵的初次飛行-福岡探索之旅 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --fuji-blue: #A5D8FF; --soft-pink: #FFD1E3; --main-bg: #FDF2F8; }
        body { font-family: 'Zen Maru Gothic', sans-serif; background-color: var(--main-bg); color: #4A4A4A; overflow-x: hidden; }
        .magazine-header { position: relative; width: 100%; height: 280px; overflow: hidden; border-radius: 0 0 3.5rem 3.5rem; z-index: 10; }
        .magazine-header img { width: 100%; height: 100%; object-fit: cover; object-position: 85% center; }
        .magazine-title-overlay { position: absolute; bottom: 65px; left: 80px; right: 20px; text-shadow: 0 2px 8px rgba(0,0,0,0.2); }
        .tab-overlay { position: absolute; top: 30px; left: 20px; display: flex; flex-direction: column; gap: 10px; z-index: 30; }
        .tab-btn { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(8px); width: 38px; height: 38px; border-radius: 12px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1); color: #888; transition: 0.3s; font-size: 1rem; }
        .tab-btn.active { background: #3B82F6; color: white; transform: scale(1.1); }
        .main-content { margin-top: -50px; background: white; border-radius: 3.5rem 3.5rem 0 0; position: relative; z-index: 20; min-height: 100vh; padding-bottom: 120px; display: flex; box-shadow: 0 -10px 30px rgba(0,0,0,0.05); }
        .side-date-nav { width: 65px; flex-shrink: 0; padding: 25px 0; border-right: 1px solid #f8fafc; display: flex; flex-direction: column; align-items: center; gap: 12px; position: sticky; top: 0; height: 100vh; }
        .date-icon-btn { width: 45px; height: 60px; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 1.2rem; background: #F8FAFC; transition: 0.3s; cursor: pointer; border: 1px solid #f1f5f9; }
        .date-icon-btn.active { background: #3B82F6; color: white; border: none; box-shadow: 0 5px 12px rgba(59, 130, 246, 0.2); }
        .date-icon-btn i { font-size: 1rem; margin-bottom: 3px; }
        .date-icon-btn span { font-size: 0.6rem; font-weight: 900; }
        .itin-scroll-area { flex-grow: 1; padding: 25px 15px; }
        .itin-card { border-radius: 1.8rem; padding: 1.2rem; border-left: 8px solid #e2e8f0; border: 1px solid #f1f5f9; background: white; margin-bottom: 1.2rem; position: relative; }
        .card-flight { border-left-color: #3b82f6; background-color: #eff6ff; }
        .card-spot { border-left-color: #ef4444; }
        .card-food { border-left-color: #f97316; }
        .card-hotel { border-left-color: #ec4899; }
        .card-shop { border-left-color: #8b5cf6; }
        .transport-btn { background: #F0F7FF; color: #1E40AF; padding: 8px 12px; border-radius: 10px; font-size: 10px; font-weight: bold; margin-top: 10px; display: inline-block; cursor: pointer; border: 1px solid #A5D8FF; }
        .transport-detail { display: none; padding: 12px; background: #F8FAFC; border-radius: 14px; border: 1px dashed #3B82F6; font-size: 11px; margin-top: 8px; line-height: 1.6; }
        .guide-tag { padding: 2px 8px; border-radius: 6px; font-size: 9px; font-weight: 900; margin-right: 4px; display: inline-block; color: white; }
        .fab-add { position: fixed; bottom: 35px; right: 30px; width: 60px; height: 60px; background: #3B82F6; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; z-index: 100; box-shadow: 0 10px 25px rgba(59,130,246,0.4); }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 300; align-items: center; justify-content: center; padding: 20px; overflow-y: auto; }
        .hide-scroll::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="hide-scroll">

    <!-- 圖片燈箱 -->
    <div id="imageModal" class="modal" onclick="this.style.display='none'"><img id="modalImg" class="max-w-full max-h-full rounded-2xl shadow-2xl"></div>

    <!-- 1. 頁首 -->
    <header class="magazine-header">
        <img src="https://cdn.phototourl.com/uploads/2026-03-17-d9da9a24-6193-46a7-9e7e-8f2c87802a46.jpg" alt="Cover">
        <div class="magazine-title-overlay">
            <h1 class="text-white font-black text-lg italic tracking-tighter drop-shadow-md">🌸 朵朵的初次飛行<br>福岡探索之旅 2026</h1>
        </div>
        <div class="tab-overlay">
            <button onclick="switchTab('itin')" id="tab-itin-btn" class="tab-btn active"><i class="fa-solid fa-location-dot"></i></button>
            <button onclick="switchTab('info')" id="tab-info-btn" class="tab-btn"><i class="fa-solid fa-info"></i></button>
            <button onclick="switchTab('cart')" id="tab-cart-btn" class="tab-btn"><i class="fa-solid fa-basket-shopping"></i></button>
            <button onclick="switchTab('cash')" id="tab-cash-btn" class="tab-btn"><i class="fa-solid fa-coins"></i></button>
        </div>
    </header>

    <div class="main-content">
        <!-- 左側日期 Icon 導覽 (僅在行程頁顯示) -->
        <aside class="side-date-nav hide-scroll" id="side-nav">
            <div onclick="switchDay(1)" class="date-icon-btn active" id="d1-btn"><i class="fa-solid fa-plane"></i><span>D1</span></div>
            <div onclick="switchDay(2)" class="date-icon-btn" id="d2-btn"><i class="fa-solid fa-torii-gate"></i><span>D2</span></div>
            <div onclick="switchDay(3)" class="date-icon-btn" id="d3-btn"><i class="fa-solid fa-fish"></i><span>D3</span></div>
            <div onclick="switchDay(4)" class="date-icon-btn" id="d4-btn"><i class="fa-solid fa-robot"></i><span>D4</span></div>
            <div onclick="switchDay(5)" class="date-icon-btn" id="d5-btn"><i class="fa-solid fa-plane-arrival"></i><span>D5</span></div>
        </aside>

        <!-- 行程顯示區 -->
        <div class="itin-scroll-area">
            <!-- 分頁 1: 行程 -->
            <section id="sec-itin">
                <div class="bg-blue-50 p-4 rounded-2xl flex justify-between items-center border border-blue-100 mb-6 animate-fadeIn">
                    <div class="flex items-center gap-3"><i class="fa-solid fa-cloud-sun text-xl text-yellow-500"></i><div><p class="font-black text-sm text-gray-700">18°C / <span class="opacity-50 text-xs">體感 16°C</span></p></div></div>
                    <span class="bg-white px-2 py-0.5 rounded-full text-[9px] font-bold text-blue-500 shadow-sm">福岡晴</span>
                </div>
                <div id="itin-display" class="space-y-2"></div>
            </section>

            <!-- 分頁 2: 資訊 -->
            <section id="sec-info" class="hidden space-y-6">
                <h2 class="font-black text-blue-600 mb-4 italic">Trip Info ℹ️</h2>
                <!-- 打包清單進度 -->
                <div class="bg-white rounded-3xl p-5 card-shadow italic">
                    <p class="text-xs font-black mb-2">🧳 打包進度 <span id="list-percent">0%</span></p>
                    <div class="w-full bg-gray-100 h-1.5 rounded-full overflow-hidden mb-4"><div id="list-progress" class="bg-blue-400 h-full" style="width: 0%"></div></div>
                    <div id="prep-list-container" class="space-y-2 text-[11px] font-bold"></div>
                </div>
            </section>

            <!-- 分頁 3: 購物清單 -->
            <section id="sec-cart" class="hidden space-y-4 pb-20">
                <h2 class="font-black text-purple-600 italic">Shopping List 🛒</h2>
                <div id="cart-list" class="grid grid-cols-2 gap-4"></div>
            </section>

            <!-- 分頁 4: 花費 -->
            <section id="sec-cash" class="hidden space-y-4 pb-20">
                <div class="bg-slate-800 text-white p-6 rounded-[2rem] text-center shadow-xl mb-4 italic">
                    <p class="text-[9px] opacity-60 uppercase font-bold tracking-widest">Total Cost</p>
                    <p class="text-3xl font-black italic">¥ <span id="total-jpy">0</span></p>
                    <p class="text-[10px] opacity-50 mt-1">≈ NT$ <span id="total-twd">0</span> (匯率 0.22)</p>
                </div>
                <div id="cash-list" class="space-y-3"></div>
            </section>
        </div>
    </div>

    <!-- 右下角浮動新增按鈕 -->
    <div class="fab-add" id="fab-btn" onclick="handleFab()">+</div>

    <!-- 彈出視窗：新增/編輯購物項目 -->
    <div id="modal-cart" class="modal" onclick="closeModals()">
        <div class="bg-white p-8 rounded-[2.5rem] w-full max-w-xs shadow-2xl" onclick="event.stopPropagation()">
            <h3 class="font-black mb-4">新增購物項目</h3>
            <input id="cart-name" type="text" placeholder="商品名稱" class="w-full p-3 rounded-xl bg-gray-50 border-none mb-3 text-sm font-bold">
            <input id="cart-img" type="file" accept="image/*" class="w-full text-xs mb-4">
            <button onclick="addCartItem()" class="w-full bg-blue-500 text-white py-3 rounded-xl font-black text-sm shadow-lg">確認新增</button>
        </div>
    </div>

    <!-- 彈出視窗：新增花費項目 -->
    <div id="modal-cash" class="modal" onclick="closeModals()">
        <div class="bg-white p-8 rounded-[2.5rem] w-full max-w-xs shadow-2xl space-y-3" onclick="event.stopPropagation()">
            <h3 class="font-black mb-2">新增花費</h3>
            <select id="cash-cat" class="w-full p-3 rounded-xl bg-gray-100 border-none text-sm font-bold">
                <option value="飲食">饮食</option><option value="交通">交通</option><option value="購物">購物</option>
                <option value="住宿">住宿</option><option value="門票">門票</option><option value="其他">其他</option>
            </select>
            <input id="cash-name" type="text" placeholder="項目名稱" class="w-full p-3 rounded-xl bg-gray-50 border-none text-sm font-bold">
            <input id="cash-date" type="date" class="w-full p-3 rounded-xl bg-gray-50 border-none text-sm font-bold">
            <input id="cash-jpy" type="number" placeholder="金額 (日幣 JPY)" class="w-full p-3 rounded-xl bg-gray-50 border-none text-sm font-bold">
            <select id="cash-pay" class="w-full p-3 rounded-xl bg-gray-50 border-none text-sm font-bold">
                <option value="現金">現金</option><option value="信用卡">信用卡</option>
            </select>
            <input id="cash-note" type="text" placeholder="備註" class="w-full p-3 rounded-xl bg-gray-50 border-none text-sm font-bold">
            <button onclick="addCashItem()" class="w-full bg-blue-500 text-white py-3 rounded-xl font-black text-sm shadow-lg mt-2">儲存花費</button>
        </div>
    </div>

    <script>
        const tripData = {
            1: [
                { cat: 'flight', name: 'BR106 抵達福岡', time: '11:20', note: '🌟 機場必喝：抹茶拿鐵 (51B)', icon: 'fa-plane' },
                { cat: 'hotel', name: '住宿：Branche 藥院大通', time: '12:10 Check-in', note: 'Agoda 1990699229', icon: 'fa-hotel' },
                { cat: 'food', name: '博多運河城午餐', time: '13:00', note: '推薦4/5F家庭餐廳，適合寶寶', icon: 'fa-utensils' },
                { cat: 'spot', name: '櫛田神社 ⛩️', time: '15:00', note: '靈泉鶴之井戶延年益壽', icon: 'fa-torii-gate' },
                { cat: 'shop', name: 'Bon Repas 藥院店 🛒', time: '20:30', note: '半額特價熟食！', icon: 'fa-basket-shopping' }
            ],
            2: [
                { cat: 'spot', name: '竈門神社 🌸', time: '09:40', note: '結緣勝地', icon: 'fa-torii-gate' },
                { cat: 'food', name: '若松屋鰻魚飯', time: '11:20', note: '必吃鰻魚蛋捲', icon: 'fa-bowl-rice' },
                { cat: 'shop', name: 'Mina 天神 🛍️', time: '16:30', note: '西松屋補貨', icon: 'fa-shirt' }
            ],
            3: [
                { cat: 'food', name: '食堂 おわん 🍱', time: '09:00', note: '日式明太子釜飯', icon: 'fa-utensils' },
                { cat: 'spot', name: '海洋世界 🐬', time: '11:00', note: '海豚海獅表演', icon: 'fa-fish' }
            ],
            4: [
                { cat: 'spot', name: 'LaLaport 福岡 🤖', time: '16:30', note: '看1:1鋼彈', icon: 'fa-robot' },
                { cat: 'shop', name: '博多伴手禮 🎁', time: '19:00', note: '努努雞/治一郎', icon: 'fa-gift' }
            ],
            5: [
                { cat: 'flight', name: 'BR105 返台 ✈️', time: '12:20', note: '10:20 往機場', icon: 'fa-plane-arrival' }
            ]
        };

        const prepItems = ["護照截圖", "Visit Japan QR", "交通 App", "Suica 加值", "esim 網路", "推車+防水罩", "奶粉奶瓶", "尿布濕巾", "常備藥"];
        let currentTab = 'itin';

        // 初始化
        window.onload = () => {
            renderPrepList();
            renderCart();
            renderCash();
            switchDay(1);
            document.getElementById('cash-date').valueAsDate = new Date();
        };

        function switchTab(tab) {
            currentTab = tab;
            ['itin', 'info', 'cart', 'cash'].forEach(s => {
                document.getElementById('sec-' + s).classList.add('hidden');
                document.getElementById('tab-' + s + '-btn').classList.remove('active');
            });
            document.getElementById('sec-' + tab).classList.remove('hidden');
            document.getElementById('tab-' + tab + '-btn').classList.add('active');
            document.getElementById('side-nav').style.display = (tab === 'itin') ? 'flex' : 'none';
            document.getElementById('fab-btn').style.display = (tab === 'cart' || tab === 'cash') ? 'flex' : 'none';
        }

        function switchDay(day) {
            const list = document.getElementById('itin-display');
            list.innerHTML = '';
            document.querySelectorAll('.date-icon-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('d'+day+'-btn').classList.add('active');
            tripData[day].forEach(item => {
                list.innerHTML += `<div class="itin-card card-${item.cat}">
                    <div class="flex justify-between items-center mb-1"><span class="guide-tag bg-slate-400">${item.cat.toUpperCase()}</span><span class="text-[10px] font-black text-blue-400">${item.time}</span></div>
                    <h4 class="font-black text-gray-800 text-sm italic">${item.name}</h4><p class="text-[9px] text-gray-400 mt-1">${item.note}</p>
                </div>`;
            });
        }

        // 購物清單功能
        let cartItems = JSON.parse(localStorage.getItem('fuk_cart')) || [];
        function handleFab() {
            if(currentTab === 'cart') document.getElementById('modal-cart').style.display = 'flex';
            if(currentTab === 'cash') document.getElementById('modal-cash').style.display = 'flex';
        }
        function closeModals() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }
        
        function addCartItem() {
            const name = document.getElementById('cart-name').value;
            const imgFile = document.getElementById('cart-img').files[0];
            if(!name) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                cartItems.push({ name, img: e.target.result });
                localStorage.setItem('fuk_cart', JSON.stringify(cartItems));
                renderCart();
                closeModals();
            };
            if(imgFile) reader.readAsDataURL(imgFile);
            else { cartItems.push({ name, img: '' }); localStorage.setItem('fuk_cart', JSON.stringify(cartItems)); renderCart(); closeModals(); }
        }
        function renderCart() {
            const grid = document.getElementById('cart-list');
            grid.innerHTML = '';
            cartItems.forEach((item, i) => {
                grid.innerHTML += `<div class="bg-white p-3 rounded-2xl shadow-sm border border-purple-100 relative">
                    ${item.img ? `<img src="${item.img}" class="w-full h-24 object-cover rounded-xl mb-2">` : `<div class="h-24 bg-gray-50 flex items-center justify-center rounded-xl mb-2"><i class="fa-solid fa-bag-shopping text-gray-200"></i></div>`}
                    <p class="text-xs font-bold text-center italic">${item.name}</p>
                    <button onclick="removeCart(${i})" class="absolute top-1 right-1 text-gray-300"><i class="fa-solid fa-circle-xmark"></i></button>
                </div>`;
            });
        }
        function removeCart(i) { cartItems.splice(i, 1); localStorage.setItem('fuk_cart', JSON.stringify(cartItems)); renderCart(); }

        // 記帳本功能
        let expenses = JSON.parse(localStorage.getItem('fuk_cash')) || [];
        function addCashItem() {
            const cat = document.getElementById('cash-cat').value;
            const name = document.getElementById('cash-name').value;
            const date = document.getElementById('cash-date').value;
            const jpy = parseInt(document.getElementById('cash-jpy').value);
            const pay = document.getElementById('cash-pay').value;
            const note = document.getElementById('cash-note').value;
            if(!name || !jpy) return;
            expenses.push({ cat, name, date, jpy, pay, note });
            localStorage.setItem('fuk_cash', JSON.stringify(expenses));
            renderCash(); closeModals();
        }
        function renderCash() {
            const list = document.getElementById('cash-list');
            let total = 0; list.innerHTML = '';
            expenses.forEach((e, i) => {
                total += e.jpy;
                list.innerHTML += `<div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-50 italic">
                    <div class="flex justify-between items-start mb-1"><span class="text-[9px] font-black text-blue-500">${e.date} (${e.cat})</span><button onclick="removeCash(${i})" class="text-gray-200">✕</button></div>
                    <div class="flex justify-between font-black text-sm"><span>${e.name}</span><span class="text-blue-600">¥${e.jpy.toLocaleString()}</span></div>
                    <div class="text-[9px] text-gray-400 mt-1">${e.pay} | ${e.note}</div>
                </div>`;
            });
            document.getElementById('total-jpy').innerText = total.toLocaleString();
            document.getElementById('total-twd').innerText = Math.round(total * 0.22).toLocaleString();
        }
        function removeCash(i) { expenses.splice(i, 1); localStorage.setItem('fuk_cash', JSON.stringify(expenses)); renderCash(); }

        // 打包清單功能
        function renderPrepList() {
            const container = document.getElementById('prep-list-container');
            prepItems.forEach((item, i) => {
                container.innerHTML += `<label class="flex items-center gap-3 p-3 bg-gray-50 rounded-xl"><input type="checkbox" onchange="updateProgress()" class="checkbox-custom"> ${item}</label>`;
            });
        }
        function updateProgress() {
            const checks = document.querySelectorAll('#prep-list-container input[type="checkbox"]');
            const done = Array.from(checks).filter(c => c.checked).length;
            const percent = Math.round((done / checks.length) * 100);
            document.getElementById('list-percent').innerText = percent + '%';
            document.getElementById('list-progress').style.width = percent + '%';
        }
    </script>
</body>
</html>
