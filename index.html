<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🌸朵朵的初次飛行-福岡探索之旅 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --main-bg: #FDF2F8; --fuji-blue: #3B82F6; --soft-pink: #EC4899; }
        body { font-family: 'Zen Maru Gothic', sans-serif; background-color: var(--main-bg); color: #4A4A4A; overflow-x: hidden; }
        
        /* 頁首：雜誌感 + 右下功能區 */
        .magazine-header { position: relative; width: 100%; height: 240px; overflow: hidden; border-radius: 0 0 3rem 3rem; z-index: 10; }
        .magazine-header img { width: 100%; height: 100%; object-fit: cover; object-position: 85% center; }
        .magazine-title-overlay { position: absolute; bottom: 25px; left: 20px; right: 100px; text-shadow: 0 2px 8px rgba(0,0,0,0.5); z-index: 20; color: white; }

        /* 功能 ICON 移至右下角獨立區塊 */
        .tab-nav-panel { position: absolute; bottom: 15px; right: 15px; background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); padding: 8px; border-radius: 1.5rem; display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px; z-index: 50; border: 1px solid rgba(255,255,255,0.4); }
        .tab-btn { width: 34px; height: 34px; border-radius: 10px; display: flex; align-items: center; justify-content: center; background: white; color: #888; transition: 0.3s; font-size: 0.9rem; }
        .tab-btn.active { background: var(--fuji-blue); color: white; }

        /* 主佈局 */
        .main-app-layout { display: flex; margin-top: 15px; }
        .side-date-nav { width: 65px; flex-shrink: 0; display: flex; flex-direction: column; align-items: center; gap: 12px; position: sticky; top: 15px; height: calc(100vh - 40px); }
        .date-icon-btn { width: 46px; height: 60px; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 1.2rem; background: white; border: 1px solid #f1f5f9; cursor: pointer; transition: 0.3s; }
        .date-icon-btn.active { background: var(--fuji-blue); color: white; border: none; box-shadow: 0 5px 12px rgba(59, 130, 246, 0.2); }
        .date-icon-btn i { font-size: 1rem; margin-bottom: 2px; }
        .date-icon-btn span { font-size: 0.6rem; font-weight: 900; }

        /* 行程卡片 */
        .content-area { flex-grow: 1; padding: 0 15px 120px 5px; }
        .itin-card { border-radius: 1.8rem; padding: 1.2rem; border-left: 8px solid #e2e8f0; border: 1px solid #f1f5f9; background: white; margin-bottom: 1.2rem; position: relative; }
        .card-flight { border-left-color: #3b82f6; background-color: #eff6ff; }
        .card-spot { border-left-color: #ef4444; }
        .card-food { border-left-color: #f97316; }
        .card-hotel { border-left-color: #ec4899; }
        .card-shop { border-left-color: #8b5cf6; }

        /* 備註編輯器樣式 */
        .memo-box { background: #F8FAFC; border-radius: 12px; padding: 8px 12px; font-size: 11px; color: #64748b; margin-top: 10px; border: 1px solid #f1f5f9; }
        .memo-btn { font-size: 9px; font-weight: 900; color: #3b82f6; margin-top: 5px; cursor: pointer; text-decoration: underline; }

        .transport-detail { display: none; padding: 12px; background: #f0f7ff; border-radius: 14px; border: 1px dashed #3B82F6; font-size: 11px; margin-top: 10px; color: #1e40af; line-height: 1.5; }
        .guide-tag { padding: 2px 8px; border-radius: 6px; font-size: 9px; font-weight: 900; margin-right: 4px; display: inline-block; color: white; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 300; align-items: center; justify-content: center; padding: 20px; overflow-y: auto; }
        .checkbox-custom { width: 1.3rem; height: 1.3rem; border-radius: 0.4rem; border: 2px solid #A5D8FF; appearance: none; cursor: pointer; flex-shrink: 0; position: relative; }
        .checkbox-custom:checked { background: #3B82F6; border-color: #3B82F6; }
        .checkbox-custom:checked::after { content: '✓'; position: absolute; color: white; font-size: 0.9rem; left: 3px; top: -1px; }
        .hide-scroll::-webkit-scrollbar { display: none; }
    </style>
</head>

            </section>
        </div>
    </div>

        let currentDay = 1;
        let expenses = JSON.parse(localStorage.getItem('fuk_money_v4')) || [];
        let shopping = JSON.parse(localStorage.getItem('fuk_cart_v4')) || [];
        let checkStatus = JSON.parse(localStorage.getItem('fuk_check_v4')) || {};
        let userMemos = JSON.parse(localStorage.getItem('fuk_memos_v4')) || {};

        // 分頁控制
        function switchTab(tab) {
            ['itin', 'info', 'cart', 'cash'].forEach(s => {
                document.getElementById('sec-' + s).classList.add('hidden');
                document.getElementById('tab-' + s + '-btn').classList.remove('active');
            });
            document.getElementById('sec-' + tab).classList.remove('hidden');
            document.getElementById('tab-' + tab + '-btn').classList.add('active');
            document.getElementById('side-nav').style.display = (tab === 'itin') ? 'flex' : 'none';
            document.getElementById('fab-btn').style.display = (tab === 'cart' || tab === 'cash') ? 'flex' : 'none';
            window.scrollTo(0,0);
        }

        // 行程渲染
        function switchDay(day) {
            currentDay = day;
            const list = document.getElementById('itin-display');
            list.innerHTML = '';
            document.querySelectorAll('.date-icon-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('d'+day+'-btn').classList.add('active');

            tripData[day].forEach((item, idx) => {
                const card = document.createElement('div');
                card.className = `itin-card card-${item.cat} animate-fadeIn`;
                const memoKey = `d${day}_i${idx}`;
                const savedMemo = userMemos[memoKey] || "";
                
                let content = `<div class="flex justify-between items-start mb-2"><span class="guide-tag bg-slate-400 uppercase italic">${item.cat}</span><span class="text-[10px] font-black text-blue-400 italic">${item.time}</span></div>`;
                content += `<div class="flex justify-between"><div><h4 class="font-black text-gray-800 text-sm italic underline decoration-blue-50">${item.name}</h4><p class="text-[9px] text-gray-400 mt-2 font-bold">${item.note || ''}</p></div>`;
                if(item.maps) content += `<a href="https://www.google.com/maps/search/?api=1&query=${item.maps}" class="text-blue-500"><i class="fa-solid fa-map-location-dot"></i></a>`;
                content += `</div>`;
                
                if(item.cert) content += `<button onclick="viewImg('${item.cert}')" class="transport-btn mt-2 shadow-sm">查看憑證 ➔</button>`;
                if(item.img) content += `<img src="${item.img}" class="mt-2 rounded-xl h-28 w-full object-cover shadow-sm" onclick="viewImg('${item.img}')">`;
                if(item.gallery) content += `<div class="grid grid-cols-2 gap-2 mt-2">${item.gallery.map(g => `<img src="${g}" class="rounded-xl h-20 object-contain bg-gray-50" onclick="viewImg('${g}')">`).join('')}</div>`;
                if(item.trans) content += `<div class="transport-btn mt-2" onclick="this.nextElementSibling.style.display='block'">前往方式 ➔</div><div class="transport-detail italic font-bold trans-box">${item.trans}</div>`;
                if(item.taxi) content += `<button onclick="showTaxiCard('${item.taxi}')" class="mt-3 w-full bg-blue-500 text-white py-2.5 rounded-2xl text-[10px] font-black shadow-lg italic italic tracking-tighter">🚕 司機字卡</button>`;
                
                // 備註欄位
                content += `<div id="memo-box-${memoKey}" class="${savedMemo ? '' : 'hidden'} memo-box">📝 ${savedMemo}</div>`;
                content += `<div class="memo-btn" onclick="editMemo('${memoKey}')">✎ 編輯備註</div>`;
                
                card.innerHTML = content;
                list.appendChild(card);
            });
        }

        // 打包清單渲染
        function renderChecklist() {
            const container = document.getElementById('checklist-render');
            container.innerHTML = '';
            checkList.forEach(group => {
                container.innerHTML += `<p class="text-xs font-black text-gray-400 mt-4 mb-2 underline">${group.cat}類</p>`;
                group.items.forEach(item => {
                    const isChecked = checkStatus[item] ? 'checked' : '';
                    container.innerHTML += `<label class="flex items-center gap-3 bg-gray-50 p-3 rounded-xl italic font-bold text-[11px]"><input type="checkbox" onchange="upCheck('${item}')" class="checkbox-custom" ${isChecked}> ${item}</label>`;
                });
            });
            upPercent();
        }
        function upCheck(item) { checkStatus[item] = !checkStatus[item]; localStorage.setItem('fuk_check_v4', JSON.stringify(checkStatus)); upPercent(); }
        function upPercent() {
            const total = checkList.reduce((acc, g) => acc + g.items.length, 0);
            const done = Object.values(checkStatus).filter(v => v).length;
            const percent = Math.round((done / total) * 100);
            document.getElementById('list-percent').innerText = percent + '%';
            document.getElementById('list-progress').style.width = percent + '%';
        }

        // 編輯備註
        function editMemo(key) {
            const current = userMemos[key] || "";
            const newVal = prompt("請輸入您的備註：", current);
            if(newVal !== null) {
                userMemos[key] = newVal;
                localStorage.setItem('fuk_memos_v4', JSON.stringify(userMemos));
                switchDay(currentDay);
            }
        }

        function showTaxiCard(addr) { document.getElementById('taxi-addr').innerText = addr; document.getElementById('taxiModal').style.display = 'flex'; }
        function viewImg(url) { document.getElementById('modalImg').src = url; document.getElementById('imageModal').style.display = 'flex'; }
        function handleFab() { alert("功能開發中，暫時請使用 JavaScript 手動編輯。"); }

        window.onload = () => { renderChecklist(); switchDay(1); };
    </script>
</body>
</html>
