<!DOCTYPE html>
<html lang="zh-Hant">

            --fuji-blue: #A5D8FF;
            --soft-pink: #FFD1E3;
            --main-bg: #FDF2F8; /* 依照圖片底色延伸 */
        }
        body { font-family: 'Zen Maru Gothic', sans-serif; background-color: var(--main-bg); color: #4A4A4A; overflow-x: hidden; }
        
        /* 頁首雜誌感：縮小高度且焦點向右 */
        .magazine-header { 
            position: relative; 
            width: 100%; 
            height: 280px; 
            overflow: hidden; 
            border-radius: 0 0 3.5rem 3.5rem; 
            z-index: 10;
        }
        .magazine-header img { width: 100%; height: 100%; object-fit: cover; object-position: 85% center; }
        
        /* 頁首標題浮動在圖上 */
        .magazine-title-overlay { 
            position: absolute; bottom: 65px; left: 85px; right: 20px; 
            text-shadow: 0 2px 8px rgba(0,0,0,0.3); z-index: 20;
        }

        /* 1. 功能分頁 ICON：縮小並移至左上角浮動 */
        .tab-sidebar {
            position: absolute;
            top: 25px;
            left: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 40;
        }
        .tab-btn {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(8px);
            width: 36px;
            height: 36px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            color: #888;
            transition: 0.3s;
            font-size: 0.9rem;
        }
        .tab-btn.active { background: #3B82F6; color: white; transform: scale(1.1); box-shadow: 0 6px 15px rgba(59, 130, 246, 0.3); }

        /* 主內容圓弧銜接與重疊 */
        .main-content-wrapper {
            margin-top: -50px; 
            background: white;
            border-radius: 3.5rem 3.5rem 0 0;
            position: relative;
            z-index: 30;
            min-height: 100vh;
            display: flex;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.05);
        }

        /* 2. 左側垂直日期導覽 */
        .side-date-nav {
            width: 65px;
            flex-shrink: 0;
            padding: 30px 0;
            border-right: 1px solid #f8fafc;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            position: sticky;
            top: 0;
            height: 100vh;
        }
        .date-icon-btn {
            width: 44px;
            height: 58px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 1.2rem;
            background: #F8FAFC;
            transition: 0.3s;
            cursor: pointer;
            border: 1px solid #f1f5f9;
        }
        .date-icon-btn.active { background: #3B82F6; color: white; border: none; box-shadow: 0 5px 12px rgba(59, 130, 246, 0.2); }
        .date-icon-btn i { font-size: 1rem; margin-bottom: 3px; }
        .date-icon-btn span { font-size: 0.6rem; font-weight: 900; }

        .itin-scroll-area { flex-grow: 1; padding: 25px 15px 120px 15px; }
        .itin-card { border-radius: 1.8rem; padding: 1.2rem; border-left: 8px solid #e2e8f0; border: 1px solid #f1f5f9; background: white; margin-bottom: 1.5rem; position: relative; }
        .card-flight { border-left-color: #3b82f6; background-color: #eff6ff; }
        .card-spot { border-left-color: #ef4444; }
        .card-food { border-left-color: #f97316; }
        .card-hotel { border-left-color: #ec4899; }
        .card-shop { border-left-color: #8b5cf6; }

        /* 交通詳情樣式 */
        .trans-box { background: #f0f7ff; padding: 12px; border-radius: 14px; border: 1px dashed #A5D8FF; font-size: 11px; margin: 10px 0; color: #1e40af; line-height: 1.6; }
        .transport-btn { background: #f8fafc; color: #64748b; padding: 6px 12px; border-radius: 8px; font-size: 9px; font-weight: bold; border: 1px solid #e2e8f0; display: inline-block; cursor: pointer; }
        
        .guide-tag { padding: 2px 8px; border-radius: 6px; font-size: 9px; font-weight: 900; margin-right: 4px; display: inline-block; color: white; }
        .fab-add { position: fixed; bottom: 30px; right: 25px; width: 55px; height: 55px; background: #3B82F6; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; z-index: 100; box-shadow: 0 8px 20px rgba(59,130,246,0.3); }
        
        .checkbox-custom { width: 1.3rem; height: 1.3rem; border-radius: 0.4rem; border: 2px solid #A5D8FF; appearance: none; cursor: pointer; flex-shrink: 0; position: relative; }

        .hide-scroll::-webkit-scrollbar { display: none; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 300; align-items: center; justify-content: center; padding: 20px; overflow-y: auto; }

        const checklist = [
            { cat: 'core', name: '護照與機票截圖' }, { cat: 'core', name: 'Visit Japan QR Code' }, { cat: 'core', name: '交通 App & Suica' },
            { cat: 'baby', name: '推車+防水罩+揹帶' }, { cat: 'baby', name: '奶粉奶瓶/副食品' }, { cat: 'baby', name: '濕巾/尿布/常備藥' },
            { cat: 'luggage', name: '行動電源/保冷袋' }, { cat: 'luggage', name: '自拍棒/攝影機' }
        ];

        let currentDay = 1;
        let expenses = JSON.parse(localStorage.getItem('fuk_exp')) || [];

        // 功能切換
        function switchTab(tab) {
            ['itin', 'info', 'cart', 'cash'].forEach(s => {
                document.getElementById('sec-' + s).classList.add('hidden');
                document.getElementById('tab-' + s + '-btn').classList.remove('active');
            });
            document.getElementById('sec-' + tab).classList.remove('hidden');
            document.getElementById('tab-' + tab + '-btn').classList.add('active');
            document.getElementById('side-nav').style.display = (tab === 'itin') ? 'flex' : 'none';
        }

        // 天數切換
        function switchDay(day) {
            currentDay = day;
            const list = document.getElementById('itin-display');
            list.innerHTML = '';
            document.querySelectorAll('.date-icon-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('d'+day+'-btn').classList.add('active');

            tripData[day].forEach(item => {
                const card = document.createElement('div');
                card.className = `itin-card card-${item.cat} animate-fadeIn shadow-sm`;
                let content = `
                    <div class="flex justify-between items-start mb-2">
                        <span class="guide-tag bg-slate-100 text-slate-400 uppercase">${item.cat}</span>
                        <span class="text-[9px] font-black text-blue-400">${item.time}</span>
                    </div>
                    <div class="flex justify-between items-center">
                        <h4 class="font-black text-gray-800 text-sm italic underline decoration-blue-50">${item.name}</h4>
                        ${item.maps ? `<a href="https://www.google.com/maps/search/?api=1&query=${item.maps}" class="text-blue-500"><i class="fa-solid fa-map-location-dot"></i></a>` : ''}
                    </div>
                    <p class="text-[9px] text-gray-400 mt-2 font-bold">${item.note}</p>
                `;
                if(item.cert) content += `<button onclick="viewImg('${item.cert}')" class="transport-btn mt-2">查看憑證 ➔</button>`;
                if(item.img) content += `<img src="${item.img}" class="mt-2 rounded-xl h-32 w-full object-cover shadow-inner" onclick="viewImg('${item.img}')">`;
                if(item.gallery) content += `<div class="grid grid-cols-2 gap-2 mt-2">${item.gallery.map(g => `<img src="${g}" class="rounded-xl h-24 object-contain bg-gray-50" onclick="viewImg('${g}')">`).join('')}</div>`;
                if(item.transInfo) content += `<button class="transport-btn mt-2" onclick="this.nextElementSibling.style.display='block'">前往方式 ➔</button><div class="transport-detail italic font-bold trans-box">${item.transInfo}</div>`;
                if(item.taxi) content += `<button onclick="showTaxiCard('${item.taxi}')" class="mt-3 w-full bg-blue-500 text-white py-2.5 rounded-2xl text-[10px] font-black italic shadow-lg">🚕 司機字卡</button>`;
                
                card.innerHTML = content;
                list.appendChild(card);
            });
        }

        // 字卡邏輯
        function showTaxiCard(addr) {
            const modal = document.getElementById('taxiModal');
            document.getElementById('taxi-addr').innerText = addr;
            modal.style.display = 'flex';
        }

        // 憑證大圖
        function viewImg(url) { document.getElementById('modalImg').src = url; document.getElementById('imageModal').style.display = 'flex'; }

        // 清單渲染
        function renderChecklist() {
            const container = document.getElementById('checklist-container');
            checklist.forEach((item, i) => {
                container.innerHTML += `<label class="flex items-center gap-3 bg-gray-50 p-3 rounded-xl"><input type="checkbox" onchange="updateProgress()" class="checkbox-custom"> ${item.name}</label>`;
            });
        }
        function updateProgress() {
            const checks = document.querySelectorAll('#checklist-container input[type="checkbox"]');
            const done = Array.from(checks).filter(c => c.checked).length;
            const percent = Math.round((done / checks.length) * 100);
            document.getElementById('list-percent').innerText = percent + '%';
            document.getElementById('list-progress').style.width = percent + '%';
        }

        // 記帳渲染
        function renderCash() {
            const list = document.getElementById('expense-list');
            let total = 0; list.innerHTML = '';
            expenses.forEach((e, i) => {
                total += e.jpy;
                list.innerHTML += `<div class="bg-white p-4 rounded-2xl shadow-sm italic flex justify-between"><span>${e.name}</span><span class="text-blue-600 font-black">¥${e.jpy}</span></div>`;
            });
            document.getElementById('total-jpy').innerText = total.toLocaleString();
            document.getElementById('total-twd').innerText = Math.round(total * 0.22).toLocaleString();
        }

        function handleFab() {
            const jpy = prompt("輸入日幣金額:");
            const name = prompt("輸入項目名稱:");
            if(jpy && name) {
                expenses.push({ name, jpy: parseInt(jpy) });
                localStorage.setItem('fuk_exp', JSON.stringify(expenses));
                renderCash();
            }
        }

        window.onload = () => { renderChecklist(); renderCash(); switchDay(1); };
    </script>
</body>
</html>
