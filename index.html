<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🌸朵朵的初次飛行-福岡探索之旅 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --fuji-blue: #A5D8FF; --soft-pink: #FFD1E3; --main-bg: #FDF2F8; }
        body { font-family: 'Zen Maru Gothic', sans-serif; background-color: var(--main-bg); color: #4A4A4A; overflow-x: hidden; }
        
        /* 頁首雜誌感 */
        .magazine-header { position: relative; width: 100%; height: 260px; overflow: hidden; border-radius: 0 0 3rem 3rem; z-index: 10; }
        .magazine-header img { width: 100%; height: 100%; object-fit: cover; object-position: 85% center; }
        .magazine-title-overlay { position: absolute; bottom: 60px; left: 75px; right: 20px; text-shadow: 0 2px 8px rgba(0,0,0,0.3); z-index: 20; }

        /* 左上方分頁 ICON */
        .tab-sidebar { position: absolute; top: 25px; left: 15px; display: flex; flex-direction: column; gap: 10px; z-index: 40; }
        .tab-btn { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(8px); width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1); color: #888; transition: 0.3s; }
        .tab-btn.active { background: #3B82F6; color: white; transform: scale(1.1); box-shadow: 0 6px 15px rgba(59, 130, 246, 0.3); }

        /* 主內容與圓弧銜接 */
        .main-content-wrapper { margin-top: -50px; background: white; border-radius: 3.5rem 3.5rem 0 0; position: relative; z-index: 30; min-height: 100vh; display: flex; box-shadow: 0 -10px 30px rgba(0,0,0,0.05); }

        /* 左側垂直日期 Icon 導覽 */
        .side-date-nav { width: 65px; flex-shrink: 0; padding: 30px 0; border-right: 1px solid #f8fafc; display: flex; flex-direction: column; align-items: center; gap: 12px; position: sticky; top: 0; height: 100vh; }
        .date-icon-btn { width: 44px; height: 58px; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 1.2rem; background: #F8FAFC; transition: 0.3s; cursor: pointer; border: 1px solid #f1f5f9; }
        .date-icon-btn.active { background: #3B82F6; color: white; border: none; box-shadow: 0 5px 12px rgba(59, 130, 246, 0.2); }
        .date-icon-btn i { font-size: 1rem; margin-bottom: 2px; }
        .date-icon-btn span { font-size: 0.6rem; font-weight: 900; }

        /* 行程卡片區 */
        .itin-scroll-area { flex-grow: 1; padding: 25px 15px 150px 15px; }
        .itin-card { border-radius: 1.8rem; padding: 1.2rem; border-left: 8px solid #e2e8f0; border: 1px solid #f1f5f9; background: white; margin-bottom: 1.5rem; position: relative; }
        .card-flight { border-left-color: #3b82f6; background-color: #eff6ff; }
        .card-spot { border-left-color: #ef4444; }
        .card-food { border-left-color: #f97316; }
        .card-hotel { border-left-color: #ec4899; }
        .card-shop { border-left-color: #8b5cf6; }

        .transport-detail { display: none; padding: 12px; background: #f0f7ff; border-radius: 14px; border: 1px dashed #A5D8FF; font-size: 11px; margin-top: 10px; color: #1e40af; line-height: 1.6; }
        .guide-tag { padding: 2px 8px; border-radius: 6px; font-size: 9px; font-weight: 900; margin-right: 4px; display: inline-block; color: white; }
        
        /* 底部新增按鈕 */
        .fab-add { position: fixed; bottom: 30px; right: 25px; width: 55px; height: 55px; background: #3B82F6; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; z-index: 100; box-shadow: 0 8px 20px rgba(59,130,246,0.3); transition: 0.3s; }
        .fab-add:active { transform: scale(0.9); }

        .checkbox-custom { width: 1.2rem; height: 1.2rem; border-radius: 0.4rem; border: 2px solid #A5D8FF; appearance: none; cursor: pointer; flex-shrink: 0; position: relative; }
        .checkbox-custom:checked { background: #3B82F6; border-color: #3B82F6; }
        .checkbox-custom:checked::after { content: '✓'; position: absolute; color: white; font-size: 0.8rem; left: 3px; top: -1px; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 300; align-items: center; justify-content: center; padding: 20px; overflow-y: auto; }
        .hide-scroll::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="hide-scroll">

    <!-- 圖片燈箱 -->
    <div id="imageModal" class="modal" onclick="this.style.display='none'"><img id="modalImg" class="max-w-full max-h-full rounded-2xl shadow-2xl border-4 border-white"></div>

    <!-- 1. 頁首與功能導航 -->
    <header class="magazine-header">
        <img src="https://cdn.phototourl.com/uploads/2026-03-17-d9da9a24-6193-46a7-9e7e-8f2c87802a46.jpg" alt="Cover">
        <div class="magazine-title-overlay">
            <h1 class="text-white font-black text-lg italic tracking-tighter drop-shadow-md">🌸 朵朵的初次飛行<br>福岡探索之旅 2026</h1>
        </div>
        <div class="tab-sidebar">
            <button onclick="switchTab('itin')" id="tab-itin-btn" class="tab-btn active"><i class="fa-solid fa-location-dot"></i></button>
            <button onclick="switchTab('info')" id="tab-info-btn" class="tab-btn"><i class="fa-solid fa-info"></i></button>
            <button onclick="switchTab('cart')" id="tab-cart-btn" class="tab-btn"><i class="fa-solid fa-basket-shopping"></i></button>
            <button onclick="switchTab('cash')" id="tab-cash-btn" class="tab-btn"><i class="fa-solid fa-coins"></i></button>
        </div>
    </header>

    <div class="main-content-wrapper">
        
        <!-- 2. 左側垂直日期導覽 -->
        <aside class="side-date-nav hide-scroll" id="side-nav">
            <div onclick="switchDay(1)" class="date-icon-btn active" id="d1-btn"><i class="fa-solid fa-plane"></i><span>D1</span></div>
            <div onclick="switchDay(2)" class="date-icon-btn" id="d2-btn"><i class="fa-solid fa-torii-gate"></i><span>D2</span></div>
            <div onclick="switchDay(3)" class="date-icon-btn" id="d3-btn"><i class="fa-solid fa-fish"></i><span>D3</span></div>
            <div onclick="switchDay(4)" class="date-icon-btn" id="d4-btn"><i class="fa-solid fa-robot"></i><span>D4</span></div>
            <div onclick="switchDay(5)" class="date-icon-btn" id="d5-btn"><i class="fa-solid fa-plane-arrival"></i><span>D5</span></div>
        </aside>

        <!-- 行程與分頁內容 -->
        <div class="itin-scroll-area">
            
            <!-- 分頁 1: 每日行程 -->
            <section id="sec-itin">
                <div class="bg-blue-50 p-4 rounded-2xl flex justify-between items-center border border-blue-100 mb-6 animate-fadeIn">
                    <div class="flex items-center gap-3"><i class="fa-solid fa-cloud-sun text-xl text-yellow-500"></i><div><p class="font-black text-sm text-gray-700">18°C / <span class="opacity-50 text-xs">體感 16°C</span></p></div></div>
                    <span class="bg-white px-2 py-0.5 rounded-full text-[9px] font-bold text-blue-500 shadow-sm">福岡晴</span>
                </div>
                <div id="itin-display" class="space-y-2"></div>
            </section>

            <!-- 分頁 2: 資訊 & 旅行清單 -->
            <section id="sec-info" class="hidden space-y-6 animate-fadeIn">
                <h2 class="text-xl font-black text-blue-600 italic">Travel Info ℹ️</h2>
                
                <!-- 行李打包完成度 -->
                <div class="bg-white rounded-3xl p-5 card-shadow italic border border-blue-50">
                    <div class="flex justify-between items-center mb-2">
                        <p class="text-xs font-black">🧳 行李打包完成度</p>
                        <span id="list-percent" class="text-blue-500 font-black">0%</span>
                    </div>
                    <div class="w-full bg-gray-100 h-2 rounded-full overflow-hidden mb-5"><div id="list-progress" class="bg-blue-400 h-full transition-all duration-500" style="width: 0%"></div></div>
                    <div id="checklist-render" class="space-y-3"></div>
                </div>

                <!-- 緊急號碼 -->
                <div class="bg-red-50 p-5 rounded-3xl border border-red-100 space-y-4 font-bold italic text-[11px]">
                    <h3 class="text-red-600 flex items-center gap-2"><i class="fa-solid fa-circle-exclamation"></i> 緊急聯絡資訊</h3>
                    <div class="grid grid-cols-1 gap-2">
                        <a href="tel:110" class="flex justify-between bg-white p-3 rounded-xl shadow-sm"><span>警察局 (110)</span><span class="text-blue-500">撥打</span></a>
                        <a href="tel:119" class="flex justify-between bg-white p-3 rounded-xl shadow-sm"><span>救護車 / 消防隊 (119)</span><span class="text-red-500">撥打</span></a>
                        <a href="tel:0352858185" class="flex justify-between bg-white p-3 rounded-xl shadow-sm"><span>24H 中文翻譯支援</span><span class="text-gray-400">03-5285-8185</span></a>
                        <a href="tel:05038162787" class="flex justify-between bg-white p-3 rounded-xl shadow-sm"><span>JNTO 旅遊諮詢(中文)</span><span class="text-gray-400">050-3816-2787</span></a>
                    </div>
                </div>
            </section>

            <!-- 分頁 3: 購物清單 (Shopping Basket) -->
            <section id="sec-cart" class="hidden space-y-6 animate-fadeIn pb-20">
                <div class="flex justify-between items-end">
                    <h2 class="text-xl font-black text-purple-600 italic">Shopping Bucket 🛒</h2>
                </div>
                <div id="shopping-render" class="grid grid-cols-2 gap-4"></div>
            </section>

            <!-- 分頁 4: 花費 -->
            <section id="sec-cash" class="hidden space-y-4 animate-fadeIn pb-20">
                <div class="bg-slate-800 text-white p-6 rounded-[2.5rem] text-center shadow-xl mb-4 italic">
                    <p class="text-[9px] opacity-60 uppercase font-bold tracking-widest">Total Expenses</p>
                    <p class="text-3xl font-black italic">¥ <span id="total-jpy">0</span></p>
                    <p class="text-[10px] opacity-50 mt-1">≈ NT$ <span id="total-twd">0</span></p>
                </div>
                <div id="cash-render" class="space-y-3"></div>
            </section>

        </div>
    </div>

    <!-- 右下角新增按鈕 -->
    <div class="fab-add shadow-lg" id="fab-btn" onclick="handleFab()">+</div>

    <!-- 購物項目 Modal -->
    <div id="modal-cart" class="modal" onclick="this.style.display='none'">
        <div class="bg-white p-8 rounded-[3rem] w-full max-w-xs shadow-2xl space-y-4" onclick="event.stopPropagation()">
            <h3 class="font-black text-gray-800 italic">新增購物項目</h3>
            <input id="new-cart-name" type="text" placeholder="商品名稱" class="w-full p-3 rounded-xl bg-gray-50 border-none outline-none font-bold text-sm">
            <div class="flex flex-col items-center gap-2 border-2 border-dashed border-gray-100 p-4 rounded-xl">
                <i class="fa-solid fa-camera text-2xl text-gray-300"></i>
                <input id="new-cart-img" type="file" accept="image/*" class="text-[10px] text-gray-400">
            </div>
            <button onclick="saveCartItem()" class="w-full bg-blue-500 text-white py-3 rounded-2xl font-black text-sm shadow-lg">加入清單</button>
        </div>
    </div>

    <!-- 記帳 Modal -->
    <div id="modal-cash" class="modal" onclick="this.style.display='none'">
        <div class="bg-white p-8 rounded-[3rem] w-full max-w-xs shadow-2xl space-y-3" onclick="event.stopPropagation()">
            <h3 class="font-black italic">記錄花費</h3>
            <select id="cash-cat" class="w-full p-3 rounded-xl bg-gray-50 border-none font-bold text-xs"><option>飲食</option><option>交通</option><option>購物</option><option>住宿</option><option>其他</option></select>
            <input id="cash-name" type="text" placeholder="項目" class="w-full p-3 rounded-xl bg-gray-50 border-none font-bold text-xs">
            <input id="cash-jpy" type="number" placeholder="金額 (日幣)" class="w-full p-3 rounded-xl bg-gray-50 border-none font-bold text-xs">
            <button onclick="saveCashItem()" class="w-full bg-blue-500 text-white py-3 rounded-2xl font-black text-sm shadow-lg">儲存</button>
        </div>
    </div>

    <script>
        // 行程數據集
        const tripData = {
            1: [
                { cat: 'flight', name: '航空公司 EVA AIR BR106', time: '08:00 TPE ➔ 11:20 FUK', note: '🌟 機場必喝：抹茶拿鐵 (國際線51B)', cert: 'https://cdn.phototourl.com/uploads/2026-03-17-d0a4373b-c132-4c37-83a6-db7e4d67d0ee.png' },
                { cat: 'hotel', name: '住宿：Branche 藥院大通 SeedsStay', time: '預估 12:10 Check-in', note: '訂單: 1990699229 | 🚕 ¥2,800 (NT$620)', cert: 'https://cdn.phototourl.com/uploads/2026-03-17-5539a649-76e8-441d-a714-d8a31076f51f.png', taxi: '住所：福岡県福岡市中央区平尾3-19-25' },
                { cat: 'food', name: '博多運河城午餐', time: '13:00', note: '薦4F/5F家庭餐廳。⛲️ B1水池整點噴水秀', trans: '🚕 ¥1,300 (10min) | 🚃 藥院大通 ➔ 櫛田神社前站 | 🚶 1.6km (25min)', maps: 'Canal City Hakata' },
                { cat: 'spot', name: '櫛田神社 ⛩️', time: '15:00', note: '靈泉鶴之井戶延年益壽、試力石挑戰、附近有一蘭總店', trans: '🚶 步行 3-5min。♿ 推車建議：走天橋進商業大樓搭電梯。', maps: 'Kushida Shrine' },
                { cat: 'food', name: 'AKIRA SUISAN 生魚片丼', time: '15:45', note: '超厚生魚片！便宜又大碗', img: 'https://cdn.phototourl.com/uploads/2026-03-17-ae4e14d8-7b9f-4c64-8a04-9e1467d408c4.jpg', maps: 'AKIRA SUISAN' },
                { cat: 'spot', name: '麵包超人博物館 🍭', time: '16:00', note: '沿川端通商店街往北走。入內需換揹巾', trans: '🚶 步行 7min (有頂棚不怕雨)', maps: 'Anpanman Museum Fukuoka' },
                { cat: 'food', name: '鈴懸 (すずかけ) 本店', time: '16:45', note: '福岡甜點天花板：草莓大福🍓、鈴乃○餅', gallery: ['https://cdn.phototourl.com/uploads/2026-03-17-666e9bb9-774c-4290-bf9b-5de8599eb2e2.webp', 'https://cdn.phototourl.com/uploads/2026-03-17-01da1205-01db-46c0-832c-6e5d9b23c8dc.jpg'], maps: 'Suzukake Honten' },
                { cat: 'food', name: '前田屋牛腸鍋', time: '17:00 預約', note: '代碼: TS7DNWA82N', cert: 'https://cdn.phototourl.com/uploads/2026-03-17-1f7e6db7-717f-4cc5-acf6-8f09526cd024.jpg' },
                { cat: 'shop', name: '🛒 Bon Repas 藥院店', time: '20:30', note: '20:30起半額特價熟食。距離飯店5min' }
            ],
            2: [
                { cat: 'spot', name: '竈門神社 🌸', time: '09:40', note: '最強結緣神社。注意認明「西鐵藥院站」。', trans: '🚃 西鐵藥院 ➔ 二日市(轉) ➔ 太宰府站 ➔ 🚕 1000円。' },
                { cat: 'food', name: '若松屋鰻魚飯 🍱', time: '11:20', note: '百年名店。鰻魚蛋捲必點。營業至15:30。' },
                { cat: 'spot', name: '太宰府天滿宮美食 🍡', time: '12:00', note: '梅枝餅：寺田屋(皮薄)、かさの家(人氣NO1)' },
                { cat: 'shop', name: 'Birthday 大佐野店 🍼', time: '13:30', note: '大店且旁有西松屋。適合推車午睡', trans: '🚕 太宰府站搭計程車 8-10min' },
                { cat: 'spot', name: 'Mina 天神 🛍️', time: '16:30', note: '7F 西松屋補貨。4F LOFT 雜貨。', trans: '🚶 地下街北口電梯上來即達。' }
            ],
            3: [
                { cat: 'food', name: '食堂 おわん 🍱', time: '09:00 預約', note: '明太子釜飯套餐', cert: 'https://cdn.phototourl.com/uploads/2026-03-18-14b25d1c-c3dd-4a94-9053-1e5287531a6d.png', img: 'https://cdn.phototourl.com/uploads/2026-03-18-1a0cecb5-25d7-43b0-8130-6976e7adc56a.jpg' },
                { cat: 'spot', name: '海洋世界 (水族館) 🐬', time: '11:00 表演', note: '11:00海豚秀。12:00抽天竺鼠號碼牌', trans: '🚕 往博多埠頭(¥1,500) ➔ 🚢 10:05 準時開船' },
                { cat: 'spot', name: 'MARK IS 🍼', time: '18:30', note: '3F 育兒聖地：阿卡將、爬行軟墊區' },
                { cat: 'other', name: '回飯店 🚕', time: '20:30', note: '¥2,000 直達飯店', taxi: '福岡県福岡市中央区平尾3-19-25' }
            ],
            4: [
                { cat: 'shop', name: '天神/大名區逛街 🛍️', time: '14:00', note: 'I\'m d\'onut? / Shin Shin(3-4點入座)' },
                { cat: 'spot', name: 'LaLaport (鋼彈) 🤖', time: '16:30', note: '18:00燈光秀。PIE VAT退稅', trans: '🚕 ¥1,700 | 🚌 天神大丸前(4C)搭 44/46L 直達', taxi: 'ららぽーと福岡（ガンダム立像前）' },
                { cat: 'shop', name: '博多站伴手禮 🎁', time: '19:00', note: 'LOPIA、治一郎、努努雞' }
            ],
            5: [
                { cat: 'flight', name: 'BR105 返台 ✈️', time: '12:20', note: '10:20 往機場。最後採買。', cert: 'https://cdn.phototourl.com/uploads/2026-03-18-62e9009f-c1a2-420c-8443-7135151e6f84.jpg', taxi: '福岡空港 国際線ターミナル' }
            ]
        };

        const checkData = [
            "護照及機票憑證", "Visit Japan Web QR", "交通 App & Suica", "購買 esim", "推車+防水罩", 
            "揹帶/奶粉奶瓶", "副食品調理包", "常備藥/屁屁膏", "尿布/濕紙巾", "購物用保冷袋"
        ];

        let currentTab = 'itin';
        let cartItems = JSON.parse(localStorage.getItem('fuk_cart_v3')) || [];
        let cashItems = JSON.parse(localStorage.getItem('fuk_cash_v3')) || [];
        let checkStatus = JSON.parse(localStorage.getItem('fuk_check_v3')) || Array(checkData.length).fill(false);

        // 初始化
        window.onload = () => { switchTab('itin'); switchDay(1); renderChecklist(); renderCart(); renderCash(); };

        function switchTab(tab) {
            currentTab = tab;
            ['itin', 'info', 'cart', 'cash'].forEach(s => {
                document.getElementById('sec-' + s).classList.add('hidden');
                document.getElementById('tab-' + s + '-btn').classList.remove('active');
            });
            document.getElementById('sec-' + tab).classList.remove('hidden');
            document.getElementById('tab-' + tab + '-btn').classList.add('active');
            document.getElementById('side-nav').style.display = (tab === 'itin') ? 'flex' : 'none';
            document.getElementById('fab-btn').style.display = (tab === 'cart' || tab === 'cash') ? 'flex' : 'none';
        }

        function switchDay(day) {
            const list = document.getElementById('itin-display');
            list.innerHTML = '';
            document.querySelectorAll('.date-icon-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('d'+day+'-btn').classList.add('active');

            tripData[day].forEach(item => {
                const card = document.createElement('div');
                card.className = `itin-card card-${item.cat} animate-fadeIn`;
                let content = `<div class="flex justify-between items-start mb-2"><span class="guide-tag bg-slate-400">${item.cat.toUpperCase()}</span><span class="text-[10px] font-black text-blue-400">${item.time}</span></div>`;
                content += `<div class="flex justify-between"><div><h4 class="font-black text-gray-800 text-sm italic underline decoration-blue-50">${item.name}</h4><p class="text-[9px] text-gray-400 mt-2 font-bold">${item.note}</p></div>`;
                if(item.maps) content += `<a href="https://www.google.com/maps/search/?api=1&query=${item.maps}" class="text-blue-500"><i class="fa-solid fa-map-location-dot"></i></a>`;
                content += `</div>`;
                if(item.cert) content += `<button onclick="viewImg('${item.cert}')" class="mt-2 text-[8px] bg-blue-50 text-blue-600 px-3 py-1 rounded-full font-bold">查看憑證 ➔</button>`;
                if(item.img) content += `<img src="${item.img}" class="mt-2 rounded-xl h-28 w-full object-cover" onclick="viewImg('${item.img}')">`;
                if(item.gallery) content += `<div class="grid grid-cols-2 gap-2 mt-2">${item.gallery.map(g => `<img src="${g}" class="rounded-xl h-20 object-contain bg-gray-50" onclick="viewImg('${g}')">`).join('')}</div>`;
                if(item.trans) content += `<button class="transport-btn mt-2" onclick="this.nextElementSibling.style.display='block'">前往方式 ➔</button><div class="transport-detail italic font-bold">${item.trans}</div>`;
                if(item.taxi) content += `<button onclick="showTaxiCard('${item.taxi}')" class="mt-3 w-full bg-blue-500 text-white py-2 rounded-xl text-[10px] font-black shadow-md italic">🚕 司機字卡</button>`;
                card.innerHTML = content;
                list.appendChild(card);
            });
        }

        // 旅行清單邏輯
        function renderChecklist() {
            const container = document.getElementById('checklist-render');
            container.innerHTML = '';
            checkData.forEach((item, i) => {
                container.innerHTML += `<label class="flex items-center gap-3 bg-gray-50 p-3 rounded-xl"><input type="checkbox" onchange="updateCheck(${i})" class="checkbox-custom" ${checkStatus[i]?'checked':''}> ${item}</label>`;
            });
            updateProgress();
        }
        function updateCheck(i) { checkStatus[i] = !checkStatus[i]; localStorage.setItem('fuk_check_v3', JSON.stringify(checkStatus)); updateProgress(); }
        function updateProgress() {
            const done = checkStatus.filter(v => v).length;
            const percent = Math.round((done / checkData.length) * 100);
            document.getElementById('list-percent').innerText = percent + '%';
            document.getElementById('list-progress').style.width = percent + '%';
        }

        // 購物清單邏輯
        function handleFab() {
            if(currentTab === 'cart') document.getElementById('modal-cart').style.display = 'flex';
            if(currentTab === 'cash') document.getElementById('modal-cash').style.display = 'flex';
        }
        function saveCartItem() {
            const name = document.getElementById('new-cart-name').value;
            const file = document.getElementById('new-cart-img').files[0];
            if(!name) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                cartItems.push({ name, img: e.target.result });
                localStorage.setItem('fuk_cart_v3', JSON.stringify(cartItems));
                renderCart(); document.getElementById('modal-cart').style.display = 'none';
            };
            if(file) reader.readAsDataURL(file); else { cartItems.push({ name, img: '' }); localStorage.setItem('fuk_cart_v3', JSON.stringify(cartItems)); renderCart(); document.getElementById('modal-cart').style.display = 'none'; }
        }
        function renderCart() {
            const grid = document.getElementById('shopping-render');
            grid.innerHTML = '';
            cartItems.forEach((item, i) => {
                grid.innerHTML += `<div class="bg-white p-3 rounded-2xl shadow-sm border relative">
                    <button onclick="removeCart(${i})" class="absolute top-1 right-1 text-gray-300">✕</button>
                    ${item.img ? `<img src="${item.img}" class="w-full h-24 object-cover rounded-xl mb-2">` : '<div class="h-24 bg-gray-50 flex items-center justify-center rounded-xl mb-2 italic text-[10px] text-gray-300">無圖</div>'}
                    <p class="text-[11px] font-bold text-center">${item.name}</p>
                </div>`;
            });
        }
        function removeCart(i) { cartItems.splice(i, 1); localStorage.setItem('fuk_cart_v3', JSON.stringify(cartItems)); renderCart(); }

        // 記帳邏輯
        function saveCashItem() {
            const name = document.getElementById('cash-name').value;
            const jpy = parseInt(document.getElementById('cash-jpy').value);
            if(!name || !jpy) return;
            cashItems.push({ name, jpy, cat: document.getElementById('cash-cat').value });
            localStorage.setItem('fuk_cash_v3', JSON.stringify(cashItems));
            renderCash(); document.getElementById('modal-cash').style.display = 'none';
        }
        function renderCash() {
            const list = document.getElementById('cash-render');
            let total = 0; list.innerHTML = '';
            cashItems.forEach((e, i) => {
                total += e.jpy;
                list.innerHTML += `<div class="bg-white p-3 rounded-xl flex justify-between italic text-xs"><span>${e.name}</span><span class="text-blue-500 font-black">¥${e.jpy}</span></div>`;
            });
            document.getElementById('total-jpy').innerText = total.toLocaleString();
            document.getElementById('total-twd').innerText = Math.round(total * 0.22).toLocaleString();
        }

        function showTaxiCard(addr) { document.getElementById('taxi-addr').innerText = addr; document.getElementById('taxiModal').style.display = 'flex'; }
        function viewImg(url) { document.getElementById('modalImg').src = url; document.getElementById('imageModal').style.display = 'flex'; }
    </script>
</body>
</html>
