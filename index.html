<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🌸朵朵的初次飛行-福岡探索之旅 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --fuji-blue: #3B82F6; --soft-pink: #EC4899; --main-bg: #FDF2F8; }
        body { font-family: 'Zen Maru Gothic', sans-serif; background-color: var(--main-bg); color: #4A4A4A; overflow-x: hidden; }
        
        /* 頁首：圓弧銜接 */
        .magazine-header { position: relative; width: 100%; height: 250px; overflow: hidden; border-radius: 0 0 3rem 3rem; z-index: 10; }
        .magazine-header img { width: 100%; height: 100%; object-fit: cover; object-position: 85% center; }
        .magazine-title-overlay { position: absolute; bottom: 20px; left: 20px; right: 120px; text-shadow: 0 2px 8px rgba(0,0,0,0.5); z-index: 20; color: white; }

        /* 1. 功能分頁 ICON：縮小移至右下方 (橫向) */
        .tab-horizontal-nav { position: absolute; bottom: 15px; right: 15px; background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); padding: 6px 12px; border-radius: 1.2rem; display: flex; gap: 8px; z-index: 50; border: 1px solid rgba(255,255,255,0.4); }
        .tab-btn { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; background: white; color: #888; transition: 0.3s; font-size: 0.8rem; }
        .tab-btn.active { background: var(--fuji-blue); color: white; }

        /* 主佈局 */
        .main-app-layout { display: flex; margin-top: 15px; }
        .side-date-nav { width: 65px; flex-shrink: 0; display: flex; flex-direction: column; align-items: center; gap: 12px; position: sticky; top: 15px; height: calc(100vh - 40px); }
        .date-icon-btn { width: 44px; height: 58px; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 1.1rem; background: white; border: 1px solid #f1f5f9; cursor: pointer; transition: 0.3s; }
        .date-icon-btn.active { background: var(--fuji-blue); color: white; border: none; box-shadow: 0 5px 12px rgba(59, 130, 246, 0.2); }
        .date-icon-btn i { font-size: 0.9rem; margin-bottom: 2px; }
        .date-icon-btn span { font-size: 0.55rem; font-weight: 900; }

        /* 行程卡片區 */
        .content-area { flex-grow: 1; padding: 0 15px 120px 5px; }
        .itin-card { border-radius: 1.8rem; padding: 1.2rem; border-left: 8px solid #e2e8f0; border: 1px solid #f1f5f9; background: white; margin-bottom: 1.2rem; position: relative; }
        .card-flight { border-left-color: #3b82f6; background-color: #eff6ff; }
        .card-spot { border-left-color: #ef4444; }
        .card-food { border-left-color: #f97316; }
        .card-hotel { border-left-color: #ec4899; }
        .card-shop { border-left-color: #8b5cf6; }

        /* 修改按鈕 */
        .edit-btn { position: absolute; top: 10px; right: 10px; width: 24px; height: 24px; background: #f8fafc; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 10px; color: #cbd5e1; cursor: pointer; }
        .edit-btn:hover { color: #3b82f6; background: #eff6ff; }

        .transport-detail { display: none; padding: 12px; background: #f0f7ff; border-radius: 14px; border: 1px dashed #3B82F6; font-size: 11px; margin-top: 10px; color: #1e40af; line-height: 1.5; }
        .guide-tag { padding: 2px 8px; border-radius: 6px; font-size: 9px; font-weight: 900; margin-right: 4px; display: inline-block; color: white; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 300; align-items: center; justify-content: center; padding: 20px; overflow-y: auto; }
        .checkbox-custom { width: 1.2rem; height: 1.2rem; border-radius: 0.4rem; border: 2px solid #A5D8FF; appearance: none; cursor: pointer; flex-shrink: 0; }
        .checkbox-custom:checked { background: #3B82F6; border-color: #3B82F6; }
        .checkbox-custom:checked::after { content: '✓'; position: absolute; color: white; font-size: 0.8rem; left: 3px; top: -1px; }
        .hide-scroll::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="hide-scroll">

    <!-- 圖片燈箱 -->
    <div id="imageModal" class="modal" onclick="this.style.display='none'"><img id="modalImg" class="max-w-full max-h-full rounded-2xl shadow-2xl"></div>

    <!-- 1. 頁首與功能分頁 (橫向排列在右下) -->
    <header class="magazine-header">
        <img src="https://cdn.phototourl.com/uploads/2026-03-17-d9da9a24-6193-46a7-9e7e-8f2c87802a46.jpg" alt="Cover">
        <div class="magazine-title-overlay">
            <h1 class="font-black text-lg italic tracking-tighter">🌸 朵朵的初次飛行-福岡探索之旅 2026</h1>
        </div>
        <!-- 修正：橫向 Icon Panel -->
        <div class="tab-horizontal-nav shadow-lg">
            <button onclick="switchTab('itin')" id="tab-itin-btn" class="tab-btn active"><i class="fa-solid fa-location-dot"></i></button>
            <button onclick="switchTab('info')" id="tab-info-btn" class="tab-btn"><i class="fa-solid fa-info"></i></button>
            <button onclick="switchTab('cart')" id="tab-cart-btn" class="tab-btn"><i class="fa-solid fa-basket-shopping"></i></button>
            <button onclick="switchTab('cash')" id="tab-cash-btn" class="tab-btn"><i class="fa-solid fa-coins"></i></button>
        </div>
    </header>

    <div class="main-app-layout">
        <!-- 2. 左側日期 Icon 導覽 -->
        <aside class="side-date-nav hide-scroll" id="side-nav">
            <div onclick="switchDay(1)" class="date-icon-btn active" id="d1-btn"><i class="fa-solid fa-plane"></i><span>D1</span></div>
            <div onclick="switchDay(2)" class="date-icon-btn" id="d2-btn"><i class="fa-solid fa-torii-gate"></i><span>D2</span></div>
            <div onclick="switchDay(3)" class="date-icon-btn" id="d3-btn"><i class="fa-solid fa-dolphin"></i><span>D3</span></div>
            <div onclick="switchDay(4)" class="date-icon-btn" id="d4-btn"><i class="fa-solid fa-robot"></i><span>D4</span></div>
            <div onclick="switchDay(5)" class="date-icon-btn" id="d5-btn"><i class="fa-solid fa-house-user"></i><span>D5</span></div>
        </aside>

        <!-- 3. 右側主內容 -->
        <div class="content-area">
            <!-- 行程頁 -->
            <section id="sec-itin">
                <div id="itin-display" class="space-y-2"></div>
            </section>

            <!-- 資訊頁 (含超完整行李清單) -->
            <section id="sec-info" class="hidden space-y-6 animate-fadeIn">
                <h2 class="text-xl font-black text-blue-600 italic">Travel Info ℹ️</h2>
                <div class="bg-white rounded-3xl p-5 card-shadow border border-blue-50">
                    <div class="flex justify-between items-center mb-2"><p class="text-[11px] font-black italic">🧳 打包進度</p><span id="list-percent" class="text-blue-500 font-black">0%</span></div>
                    <div class="w-full bg-gray-100 h-1.5 rounded-full overflow-hidden mb-4"><div id="list-progress" class="bg-blue-400 h-full transition-all duration-500" style="width: 0%"></div></div>
                    <div id="checklist-render" class="space-y-2"></div>
                </div>
                <!-- 緊急電話 -->
                <div class="bg-red-50 p-5 rounded-3xl border border-red-100 space-y-3 italic font-bold text-[10px]">
                    <p class="text-red-600 underline">🆘 緊急聯絡中心</p>
                    <p>警察局: 110 | 救護車: 119 | 海難: 118</p>
                    <p>夜間急診諮詢: #7119</p>
                    <p>多語言翻譯專線: 03-5285-8185</p>
                    <p>JNTO 中文諮詢: 050-3816-2787</p>
                </div>
            </section>

            <!-- 購物清單 -->
            <section id="sec-cart" class="hidden animate-fadeIn">
                <h2 class="text-xl font-black text-purple-600 italic mb-4">Wish List 🛒</h2>
                <div id="cart-render" class="grid grid-cols-2 gap-3"></div>
            </section>

            <!-- 記帳花費 -->
            <section id="sec-cash" class="hidden animate-fadeIn pb-20">
                <div class="bg-slate-800 text-white p-6 rounded-[2rem] text-center shadow-xl mb-4 italic font-black">
                    <p class="text-[9px] opacity-60 uppercase">Total Trip Costs</p>
                    <p class="text-3xl italic">¥ <span id="total-jpy">0</span></p>
                    <p class="text-[10px] opacity-50 mt-1 italic">≈ NT$ <span id="total-twd">0</span> (0.22)</p>
                </div>
                <div id="cash-render" class="space-y-3"></div>
            </section>
        </div>
    </div>

    <!-- 右下角新增鈕 -->
    <div class="fixed bottom-6 right-6 flex flex-col gap-3 z-[100]">
        <div id="fab-btn" class="w-14 h-14 bg-blue-500 text-white rounded-full flex items-center justify-center shadow-2xl text-xl" style="display:none;" onclick="handleFab()">+</div>
    </div>

    <!-- 編輯行程 Modal -->
    <div id="editModal" class="modal" onclick="this.style.display='none'">
        <div class="bg-white p-8 rounded-[2.5rem] w-full max-w-xs shadow-2xl space-y-4" onclick="event.stopPropagation()">
            <h3 class="font-black italic">🔧 修正行程內容</h3>
            <input id="edit-name" type="text" class="w-full p-3 rounded-xl bg-gray-50 border-none font-bold text-xs" placeholder="景點名稱">
            <input id="edit-time" type="text" class="w-full p-3 rounded-xl bg-gray-50 border-none font-bold text-xs" placeholder="時間">
            <textarea id="edit-note" class="w-full p-3 rounded-xl bg-gray-50 border-none font-bold text-xs h-24" placeholder="備註內容"></textarea>
            <div class="flex gap-2">
                <button onclick="deleteCurrentItem()" class="flex-1 bg-red-50 text-red-500 py-3 rounded-xl font-black text-xs">刪除</button>
                <button onclick="saveEdit()" class="flex-1 bg-blue-500 text-white py-3 rounded-xl font-black text-xs shadow-lg">確認儲存</button>
            </div>
        </div>
    </div>

    <script>
        // 5天超詳細行程庫
        let tripData = JSON.parse(localStorage.getItem('fuk_trip_v5')) || {
            1: [
                { cat: 'flight', name: '航空公司 EVA AIR BR106', time: '08:00 TPE ➔ 11:20 FUK', note: '🌟 必喝：抹茶拿鐵 (國際線入境 51B)', cert: 'https://cdn.phototourl.com/uploads/2026-03-17-d0a4373b-c132-4c37-83a6-db7e4d67d0ee.png' },
                { cat: 'hotel', name: '住宿：Branche 藥院大通 SeedsStay', time: '預估 12:10 Check-in', note: 'Agoda 訂單: 1990699229', cert: 'https://cdn.phototourl.com/uploads/2026-03-17-5539a649-76e8-441d-a714-d8a31076f51f.png', taxi: '住所：福岡県福岡市中央区平尾3-19-25', trans: '🚕 計程車 (20min): ¥2,800 (NT$620)' },
                { cat: 'food', name: '13:00 運河城午餐', time: '13:00', note: '薦 4/5F 家庭餐廳，B1 有噴水秀', trans: '🚕 ¥1,300 (10min) | 🚃 藥院大通➔櫛田神社前站 | 🚶 1.6km (25min)', maps: 'Canal City Hakata' },
                { cat: 'spot', name: '15:00 櫛田神社 ⛩️', time: '15:00', note: '🙏 參拜步驟：1.手水舍洗手漱口 ➔ 2.本殿投錢(5/50円)二禮二拍手一禮 ➔ 3.100円自取求籤。<br>🏛️ 備註：靈泉鶴之井戶(延年益壽)、力石挑戰。一蘭總店在附近！', trans: '🚶 步行 3-5min。♿ 推車：由北出口走天橋入大樓搭電梯。', maps: 'Kushida Shrine' },
                { cat: 'food', name: '鈴懸 (すずかけ) 本店', time: '16:45', note: '福岡甜點天花板！🍓必買：草莓大福(靈魂)、鈴乃最中。位置在麵包超人館對面。', gallery: ['https://cdn.phototourl.com/uploads/2026-03-17-666e9bb9-774c-4290-bf9b-5de8599eb2e2.webp', 'https://cdn.phototourl.com/uploads/2026-03-17-01db-46c0-832c-6e5d9b23c8dc.jpg'], maps: 'Suzukake' }
            ],
            2: [
                { cat: 'spot', name: '竈門神社 🌸', time: '09:40', note: '最強結緣神社。交通：認明「西鐵藥院站」。', trans: '🚃 西鐵藥院 ➔ 二日市(轉) ➔ 太宰府站 ➔ 🚕 站前計程車 ¥1000' },
                { cat: 'spot', name: '太宰府天滿宮美食 🍡', time: '11:00', note: '梅枝餅對決：寺田屋(皮薄不甜)、かさの家(人氣NO1)、安武(重口味)。<br>筑紫庵炸雞堡、小鳥居布丁冰棒、一蘭五角碗。', trans: '🚕 竈門下山 ¥100或搭100円巴士。' },
                { cat: 'food', name: '若松屋鰻魚飯 🍱', time: '11:20', note: '柳川本店。必吃鰻魚蛋捲！營業至 15:30。' },
                { cat: 'shop', name: 'Mina 天神 🛍️', time: '16:30', note: '7F 西松屋重點補貨。4F LOFT 雜貨。', trans: '🚶 地下街指標往北天神，北口電梯上來。' }
            ],
            3: [
                { cat: 'food', name: '食堂 おわん 🍱', time: '09:00 預約', note: '明太子釜飯套餐', cert: 'https://cdn.phototourl.com/uploads/2026-03-18-14b25d1c-c3dd-4a94-9053-1e5287531a6d.png' },
                { cat: 'spot', name: '海洋世界 (水族館) 🐬', time: '11:00 表演', note: '🐬 11:00 海豚秀。12:00 抽天竺鼠。', trans: '🚕 往博多埠頭(¥1,500)➔🚢 10:05 準時開船' },
                { cat: 'shop', name: 'MARK IS 🍼', time: '18:30', note: '3F 阿卡將、Kids Premium Room 爬行放電區', maps: 'MARK IS Momochi' }
            ],
            4: [
                { cat: 'spot', name: '大濠公園 🌿', time: '上午', note: '全日最美星巴克。🚇 地鐵 2 站 / 🚕 8-10min' },
                { cat: 'spot', name: 'LaLaport (鋼彈) 🤖', time: '16:30', note: '18:00燈光秀。PIE VAT退稅。', trans: '🚕 ¥1,700 | 🚌 天神大丸前(4C)搭 44/46L 直達', taxi: 'ららぽーと福岡（ガンダム立像前）' }
            ],
            5: [
                { cat: 'flight', name: 'BR105 返台 ✈️', time: '12:20', note: '機場最後補貨。期待下次飛行。', cert: 'https://cdn.phototourl.com/uploads/2026-03-18-62e9009f-c1a2-420c-8443-7135151e6f84.jpg' }
            ]
        };

        const checkItems = ["護照截圖", "VJW QR", "Suica加值", "購買 esim", "推車+雨罩+揹帶", "奶粉奶瓶/副食品", "尿布濕巾", "行動電源(禁托運)", "自拍棒腳架", "相機攝影機", "常備藥品"];
        let editingIndex = -1;
        let expenses = JSON.parse(localStorage.getItem('fuk_cash_v5')) || [];
        let shopping = JSON.parse(localStorage.getItem('fuk_cart_v5')) || [];

        function switchTab(tab) {
            ['itin', 'info', 'cart', 'cash'].forEach(s => {
                document.getElementById('sec-' + s).classList.add('hidden');
                document.getElementById('tab-' + s + '-btn').classList.remove('active');
            });
            document.getElementById('sec-' + tab).classList.remove('hidden');
            document.getElementById('tab-' + tab + '-btn').classList.add('active');
            document.getElementById('side-nav').style.display = (tab === 'itin') ? 'flex' : 'none';
            document.getElementById('fab-btn').style.display = (tab === 'cart' || tab === 'cash') ? 'flex' : 'none';
        }

        function switchDay(day) {
            currentDay = day;
            const list = document.getElementById('itin-display');
            list.innerHTML = '';
            document.querySelectorAll('.date-icon-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('d'+day+'-btn').classList.add('active');

            tripData[day].forEach((item, idx) => {
                const card = document.createElement('div');
                card.className = `itin-card card-${item.cat} animate-fadeIn`;
                let content = `
                    <div class="edit-btn" onclick="openEditModal(${idx})"><i class="fa-solid fa-wrench"></i></div>
                    <div class="flex justify-between items-start mb-2"><span class="guide-tag bg-slate-400 uppercase italic">${item.cat}</span><span class="text-[9px] font-black text-blue-400">${item.time}</span></div>
                    <div class="flex justify-between"><div><h4 class="font-black text-gray-800 text-sm italic underline decoration-blue-50">${item.name}</h4><p class="text-[9px] text-gray-400 mt-2 font-bold">${item.note || ''}</p></div>`;
                if(item.maps) content += `<a href="https://www.google.com/maps/search/?api=1&query=${item.maps}" class="text-blue-500"><i class="fa-solid fa-map-location-dot"></i></a>`;
                content += `</div>`;
                if(item.cert) content += `<button onclick="viewImg('${item.cert}')" class="transport-btn mt-2 shadow-sm">查看憑證 ➔</button>`;
                if(item.gallery) content += `<div class="grid grid-cols-2 gap-2 mt-2">${item.gallery.map(g => `<img src="${g}" class="rounded-xl h-20 object-contain bg-gray-50" onclick="viewImg('${g}')">`).join('')}</div>`;
                if(item.trans) content += `<div class="transport-btn mt-2" onclick="this.nextElementSibling.style.display='block'">前往方式 ➔</div><div class="transport-detail italic font-bold">${item.trans}</div>`;
                if(item.taxi) content += `<button onclick="showTaxiCard('${item.taxi}')" class="mt-3 w-full bg-blue-500 text-white py-2.5 rounded-2xl text-[10px] font-black shadow-lg italic tracking-tighter">🚕 司機字卡</button>`;
                card.innerHTML = content;
                list.appendChild(card);
            });
        }

        // 行程編輯邏輯
        function openEditModal(idx) {
            editingIndex = idx;
            const item = tripData[currentDay][idx];
            document.getElementById('edit-name').value = item.name;
            document.getElementById('edit-time').value = item.time;
            document.getElementById('edit-note').value = item.note || "";
            document.getElementById('editModal').style.display = 'flex';
        }

        function saveEdit() {
            const item = tripData[currentDay][editingIndex];
            item.name = document.getElementById('edit-name').value;
            item.time = document.getElementById('edit-time').value;
            item.note = document.getElementById('edit-note').value;
            localStorage.setItem('fuk_trip_v5', JSON.stringify(tripData));
            switchDay(currentDay);
            document.getElementById('editModal').style.display = 'none';
        }

        function deleteCurrentItem() {
            if(confirm("確定要刪除這格行程嗎？")) {
                tripData[currentDay].splice(editingIndex, 1);
                localStorage.setItem('fuk_trip_v5', JSON.stringify(tripData));
                switchDay(currentDay);
                document.getElementById('editModal').style.display = 'none';
            }
        }

        // 清單進度
        function renderChecklist() {
            const container = document.getElementById('checklist-render');
            container.innerHTML = checkItems.map((item, i) => `<label class="flex items-center gap-3 bg-gray-50 p-3 rounded-xl italic font-bold text-[11px]"><input type="checkbox" onchange="upPercent()" class="checkbox-custom"> ${item}</label>`).join('');
        }
        function upPercent() {
            const total = checkItems.length;
            const done = document.querySelectorAll('#checklist-render input:checked').length;
            const percent = Math.round((done / total) * 100);
            document.getElementById('list-percent').innerText = percent + '%';
            document.getElementById('list-progress').style.width = percent + '%';
        }

        function showTaxiCard(addr) { document.getElementById('taxi-addr').innerText = addr; document.getElementById('taxiModal').style.display = 'flex'; }
        function viewImg(url) { document.getElementById('modalImg').src = url; document.getElementById('imageModal').style.display = 'flex'; }
        window.onload = () => { renderChecklist(); switchDay(1); };
    </script>
</body>
</html>
